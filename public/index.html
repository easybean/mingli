<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>紫微斗数排盘 API Demo</title>
    <style>
      :root {
        --ink: #171717;
        --muted: #69625a;
        --paper: #f7f2e8;
        --panel: rgba(255, 253, 247, 0.9);
        --line: rgba(74, 62, 47, 0.16);
        --gold: #b98536;
        --red: #b9412e;
        --blue: #243b6b;
        --green: #2f6f5e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          linear-gradient(115deg, rgba(185, 65, 46, 0.08), transparent 28rem),
          linear-gradient(245deg, rgba(36, 59, 107, 0.12), transparent 30rem),
          linear-gradient(135deg, #efe5d2 0%, #f7f2e8 44%, #e7edf0 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.18;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 36px 36px;
      }

      main {
        position: relative;
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 42px 0 54px;
      }

      .hero {
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 22px;
        align-items: stretch;
      }

      .title-card,
      .control-card,
      .panel {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        box-shadow: 0 22px 70px rgba(56, 41, 21, 0.12);
        backdrop-filter: blur(10px);
      }

      .title-card {
        padding: 34px;
        overflow: hidden;
        min-height: 420px;
        display: grid;
        align-content: space-between;
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--red);
        font-size: 14px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
        font-size: clamp(42px, 7vw, 86px);
        line-height: 1;
        letter-spacing: 0;
      }

      .subtitle {
        max-width: 620px;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.8;
      }

      .version-pill {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        padding: 6px 10px;
        border: 1px solid rgba(185, 65, 46, 0.18);
        border-radius: 999px;
        color: var(--red);
        background: rgba(185, 65, 46, 0.08);
        font-size: 12px;
        font-weight: 800;
      }

      .hero-note {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      .control-card {
        padding: 22px;
      }

      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 13px;
      }

      .checkbox-label {
        grid-template-columns: 18px 1fr;
        gap: 9px;
        align-items: center;
        padding-top: 22px;
      }

      input,
      select,
      button {
        width: 100%;
        border: 1px solid rgba(52, 38, 24, 0.18);
        border-radius: 8px;
        padding: 12px 13px;
        color: var(--ink);
        background: rgba(255, 253, 245, 0.86);
        font: inherit;
      }

      input[type="checkbox"] {
        width: 18px;
        min-height: 18px;
        padding: 0;
        accent-color: var(--red);
      }

      button {
        grid-column: 1 / -1;
        cursor: pointer;
        border: 0;
        color: #fff9ec;
        background: linear-gradient(135deg, var(--red), var(--gold));
        font-weight: 700;
        box-shadow: 0 12px 28px rgba(181, 66, 47, 0.22);
      }

      .status {
        grid-column: 1 / -1;
        min-height: 22px;
        color: var(--blue);
        font-size: 13px;
      }

      .result-fade {
        animation: resultFade 360ms ease both;
      }

      @keyframes resultFade {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
        margin-top: 22px;
      }

      .chip {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 245, 0.68);
      }

      .chip small {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
      }

      .chip strong {
        font-size: 18px;
      }

      .board-shell {
        margin-top: 22px;
        overflow-x: auto;
        padding-bottom: 10px;
        -webkit-overflow-scrolling: touch;
        scrollbar-color: rgba(181, 66, 47, 0.5) rgba(255, 253, 245, 0.5);
      }

      .board {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        min-width: 920px;
      }

      .palace {
        min-height: 212px;
        padding: 16px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 22px;
        background: rgba(255, 253, 245, 0.74);
      }

      .palace.empty-slot {
        color: var(--ink);
        background: rgba(255, 253, 245, 0.5);
      }

      .center-info {
        display: grid;
        grid-column: 2 / span 2;
        grid-row: 2 / span 2;
        align-content: center;
        justify-items: center;
        gap: 16px;
        height: 100%;
        min-height: 436px;
        padding: 28px;
      }

      .center-info h2 {
        margin: 0;
        color: var(--red);
        font-size: 30px;
        line-height: 1;
      }

      .center-info dl {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px 16px;
        margin: 0;
        width: min(360px, 100%);
        font-size: 17px;
        line-height: 1.35;
      }

      .center-info dt {
        color: var(--muted);
      }

      .center-info dd {
        margin: 0;
        color: var(--ink);
        font-weight: 700;
      }

      .palace header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
        margin-bottom: 10px;
      }

      .palace h2 {
        margin: 0;
        font-size: 22px;
      }

      .branch {
        color: var(--red);
        font-weight: 700;
      }

      .stars {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin: 10px 0;
      }

      .star {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 9px;
        border-radius: 999px;
        background: rgba(201, 133, 45, 0.14);
        color: #5b3c15;
        font-size: 13px;
      }

      .star.major {
        background: rgba(181, 66, 47, 0.13);
        color: var(--red);
        font-weight: 700;
      }

      .star-name {
        line-height: 1;
      }

      .brightness,
      .mutagen {
        display: inline-grid;
        place-items: center;
        min-width: 18px;
        height: 18px;
        padding: 0 4px;
        border-radius: 999px;
        font-size: 11px;
        line-height: 1;
      }

      .brightness {
        border: 1px solid rgba(29, 93, 120, 0.26);
        color: var(--blue);
        background: rgba(29, 93, 120, 0.08);
        font-weight: 700;
      }

      .mutagen {
        color: #fff9ec;
        background: var(--red);
        font-weight: 800;
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      .mobile-palace-list {
        display: none;
        margin-top: 12px;
        gap: 10px;
      }

      .mobile-palace {
        display: grid;
        grid-template-columns: 78px 1fr;
        gap: 12px;
        padding: 14px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 20px;
        background: rgba(255, 253, 245, 0.72);
      }

      .mobile-palace-title {
        display: grid;
        align-content: start;
        gap: 4px;
      }

      .mobile-palace-title strong {
        font-size: 18px;
      }

      .mobile-palace-title span {
        color: var(--red);
        font-weight: 700;
      }

      .mobile-palace .stars {
        margin: 0 0 7px;
      }

      .panel {
        margin-top: 22px;
        padding: 22px;
      }

      .panel h2 {
        margin: 0 0 14px;
      }

      .workspace-nav,
      .workspace-section {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 22px 70px rgba(56, 41, 21, 0.16);
        backdrop-filter: blur(10px);
      }

      .workspace-nav,
      .workspace-section {
        padding: 20px;
      }

      .workspace-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
        padding: 12px;
      }

      .workspace-button {
        width: auto;
        grid-column: auto;
        flex: 1 1 140px;
        min-height: 48px;
        border: 1px solid rgba(52, 38, 24, 0.14);
        border-radius: 8px;
        background: rgba(255, 253, 245, 0.76);
        color: var(--muted);
        font: inherit;
        cursor: pointer;
      }

      .workspace-button.active {
        color: #fff9ec;
        background: linear-gradient(135deg, var(--blue), var(--green));
        box-shadow: 0 12px 24px rgba(29, 93, 120, 0.18);
      }

      .workspace {
        margin-top: 18px;
      }

      .workspace-section {
        display: none;
      }

      .workspace-section.active {
        display: block;
      }

      .overview-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
        gap: 14px;
      }

      .overview-stack,
      .insight-list,
      .summary-strip {
        display: grid;
        gap: 12px;
      }

      .summary-strip {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .overview-card,
      .insight-card {
        padding: 18px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 8px;
        background: rgba(255, 253, 245, 0.72);
      }

      .overview-card h3,
      .insight-card h3 {
        margin: 0 0 10px;
        color: var(--red);
        font-size: 18px;
      }

      .overview-card strong {
        display: block;
        margin-bottom: 8px;
        font-size: 28px;
        line-height: 1.1;
      }

      .overview-hero-card {
        display: grid;
        gap: 14px;
        min-height: 100%;
      }

      .overview-hero-card strong {
        color: var(--red);
      }

      .stat-meter-list {
        display: grid;
        gap: 9px;
      }

      .stat-meter {
        display: grid;
        gap: 5px;
      }

      .stat-meter-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .stat-meter-bar {
        height: 7px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(36, 59, 107, 0.1);
      }

      .stat-meter-fill {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--green), var(--blue));
      }

      .mini-list {
        margin: 0;
        padding-left: 20px;
        color: var(--muted);
        line-height: 1.7;
      }

      .chart-shell {
        display: grid;
        gap: 18px;
      }

      .timeline-shell {
        display: grid;
        gap: 18px;
      }

      .timeline-board {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .timeline-node {
        display: grid;
        gap: 10px;
        padding: 16px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 8px;
        background: rgba(255, 253, 245, 0.72);
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .timeline-node:hover {
        transform: translateY(-2px);
        border-color: rgba(185, 65, 46, 0.26);
        background: rgba(255, 253, 245, 0.92);
      }

      .timeline-node small {
        color: var(--muted);
        font-weight: 700;
      }

      .timeline-node strong {
        color: var(--red);
        font-size: 26px;
        line-height: 1;
      }

      .timeline-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .horoscope-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
      }

      .reading-head {
        display: grid;
        gap: 12px;
        margin-bottom: 12px;
      }

      .reading-brief,
      .reading-prompt,
      .manual-card,
      .level-card {
        padding: 16px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 20px;
        background: rgba(255, 253, 245, 0.72);
      }

      .reading-brief strong {
        display: block;
        margin-bottom: 10px;
        color: var(--red);
        font-size: 22px;
        line-height: 1.25;
      }

      .reading-list {
        margin: 0;
        padding-left: 20px;
        color: var(--muted);
        line-height: 1.8;
      }

      .reading-prompt code {
        display: block;
        max-height: 188px;
        overflow: auto;
        color: var(--blue);
        font: 12px/1.65 ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre-wrap;
      }

      .reading-section {
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 20px;
        background: rgba(255, 253, 245, 0.72);
        overflow: hidden;
      }

      .reading-section summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        cursor: pointer;
        list-style: none;
        color: var(--red);
        font-weight: 700;
      }

      .reading-section summary::-webkit-details-marker {
        display: none;
      }

      .reading-section summary::after {
        content: "+";
        color: var(--muted);
      }

      .reading-section[open] summary::after {
        content: "−";
      }

      .reading-section-body {
        padding: 0 14px 14px;
      }

      .reading-group {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .reading-group h3 {
        margin: 0;
        color: var(--red);
        font-size: 18px;
      }

      .manual-grid,
      .level-grid,
      .knowledge-grid,
      .reference-list,
      .topic-grid {
        display: grid;
        gap: 12px;
      }

      .manual-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .level-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        margin-top: 12px;
      }

      .knowledge-grid,
      .reference-list,
      .topic-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-top: 12px;
      }

      .manual-card h3,
      .level-card h3,
      .reference-card h3 {
        margin: 0 0 7px;
        color: var(--red);
        font-size: 18px;
      }

      .manual-card small,
      .level-card small,
      .reference-card small {
        display: block;
        margin-bottom: 8px;
        color: var(--blue);
        font-weight: 700;
      }

      .knowledge-chip,
      .reference-card,
      .topic-card,
      .empty-card {
        padding: 14px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 18px;
        background: rgba(255, 253, 245, 0.72);
      }

      .manual-card {
        display: grid;
        gap: 10px;
      }

      .manual-header {
        display: grid;
        gap: 4px;
      }

      .manual-summary {
        margin: 0;
        color: var(--ink);
        line-height: 1.72;
      }

      .manual-section {
        border: 1px solid rgba(52, 38, 24, 0.12);
        border-radius: 14px;
        background: rgba(255, 251, 241, 0.76);
        overflow: hidden;
      }

      .manual-section summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        cursor: pointer;
        list-style: none;
        color: var(--blue);
        font-size: 14px;
        font-weight: 700;
      }

      .manual-section summary::-webkit-details-marker {
        display: none;
      }

      .manual-section summary::after {
        content: "+";
        color: var(--muted);
        font-size: 16px;
        line-height: 1;
      }

      .manual-section[open] summary::after {
        content: "−";
      }

      .manual-detail {
        padding: 10px 12px;
      }

      .knowledge-chip strong,
      .topic-card strong {
        display: block;
        margin-bottom: 6px;
        color: var(--red);
      }

      .topic-card {
        display: grid;
        gap: 10px;
      }

      .topic-header {
        display: grid;
        gap: 4px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .tag-good {
        background: rgba(72, 136, 61, 0.12);
        color: #4d7d2d;
      }

      .tag-bad {
        background: rgba(161, 62, 56, 0.12);
        color: #9f3f37;
      }

      .tag-warn {
        background: rgba(176, 126, 52, 0.14);
        color: #9d6b18;
      }

      .tag-rule-strict {
        background: rgba(49, 92, 138, 0.14);
        color: #29557d;
      }

      .tag-rule-broad {
        background: rgba(104, 74, 132, 0.14);
        color: #6a4b8a;
      }

      .tag-rule-heuristic {
        background: rgba(124, 103, 68, 0.14);
        color: #7a6744;
      }

      .topic-takeaway {
        margin: 0;
        color: var(--ink);
        font-size: 15px;
        line-height: 1.75;
      }

      .topic-driver-list {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.7;
      }

      .topic-section {
        border: 1px solid rgba(52, 38, 24, 0.12);
        border-radius: 14px;
        background: rgba(255, 251, 241, 0.76);
        overflow: hidden;
      }

      .topic-section summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        cursor: pointer;
        list-style: none;
        color: var(--blue);
        font-size: 14px;
        font-weight: 700;
      }

      .topic-section summary::-webkit-details-marker {
        display: none;
      }

      .topic-section summary::after {
        content: "+";
        color: var(--muted);
        font-size: 16px;
        line-height: 1;
      }

      .topic-section[open] summary::after {
        content: "−";
      }

      .topic-detail {
        padding: 10px 12px;
      }

      .topic-detail h4,
      .reference-group h3 {
        margin: 0 0 8px;
        color: var(--blue);
        font-size: 14px;
      }

      .topic-card ul {
        margin: 8px 0 0;
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.7;
      }

      .game-hero {
        display: grid;
        gap: 14px;
        padding: 18px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 20px;
        background: rgba(255, 253, 245, 0.72);
      }

      .game-hero strong {
        color: var(--red);
        font-size: 28px;
        line-height: 1.15;
      }

      .game-hero .topic-takeaway,
      .game-scene .topic-takeaway {
        line-height: 1.5;
      }

      .game-hero .meta,
      .game-runbar .meta,
      .game-stage-pill .meta,
      .game-scene-side-card .meta,
      .game-route-banner .meta,
      .game-scene .meta,
      .game-journal .meta,
      .choice-action .meta,
      .choice-action small {
        line-height: 1.42;
      }

      .game-hero p,
      .game-runbar p,
      .game-stage-pill p,
      .game-scene-side-card p,
      .game-route-banner p,
      .game-scene p,
      .game-journal p,
      .choice-action span,
      .choice-action small {
        margin-top: 0;
        margin-bottom: 0;
      }

      .game-runbar,
      .game-route-banner,
      .game-stage-strip,
      .game-scene,
      .game-journal {
        padding: 16px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 20px;
        background: rgba(255, 253, 245, 0.72);
      }

      .game-runbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
      }

      .game-route-banner {
        display: grid;
        gap: 8px;
        border-color: rgba(29, 93, 120, 0.18);
        background: rgba(29, 93, 120, 0.06);
      }

      .game-runbar-actions {
        display: flex;
        gap: 8px;
      }

      .ghost-button,
      .scene-card-button,
      .choice-action {
        width: auto;
        grid-column: auto;
        border-radius: 14px;
        cursor: pointer;
        font: inherit;
      }

      .ghost-button {
        border: 1px solid rgba(52, 38, 24, 0.14);
        color: var(--blue);
        background: rgba(255, 251, 241, 0.92);
        box-shadow: none;
      }

      .game-stage-strip {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .game-stage-pill {
        padding: 12px;
        border: 1px solid rgba(52, 38, 24, 0.14);
        border-radius: 16px;
        background: rgba(255, 251, 241, 0.78);
      }

      .game-stage-pill.active {
        border-color: rgba(29, 93, 120, 0.24);
        background: rgba(29, 93, 120, 0.08);
      }

      .game-stage-pill.done {
        border-color: rgba(89, 111, 53, 0.24);
        background: rgba(89, 111, 53, 0.08);
      }

      .game-play-grid,
      .game-scene-main {
        display: grid;
        gap: 12px;
      }

      .game-scene-side-card,
      .game-scene-card {
        padding: 14px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 18px;
        background: rgba(255, 251, 241, 0.78);
      }

      .game-scene-side-card small,
      .game-stage-pill small {
        color: var(--muted);
      }

      .game-stage-pill p,
      .stage-card p {
        margin-top: 0;
        margin-bottom: 0;
      }

      .game-stage-pill .meta,
      .stage-card .meta {
        line-height: 1.35;
      }

      .game-scene {
        display: grid;
        gap: 12px;
      }

      .game-scene-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .choice-action {
        display: grid;
        gap: 8px;
        text-align: left;
        padding: 12px;
        border: 1px solid rgba(52, 38, 24, 0.14);
        background: rgba(255, 251, 241, 0.9);
        box-shadow: none;
        color: var(--ink);
      }

      .choice-action small {
        color: var(--muted);
      }

      .choice-action.bold {
        border-color: rgba(181, 66, 47, 0.18);
      }

      .choice-action.steady {
        border-color: rgba(29, 93, 120, 0.18);
      }

      .choice-action.repair {
        border-color: rgba(89, 111, 53, 0.18);
      }

      .game-journal {
        display: grid;
        gap: 10px;
      }

      .journal-list {
        display: grid;
        gap: 10px;
      }

      .journal-item {
        padding: 12px;
        border-radius: 14px;
        background: rgba(255, 251, 241, 0.78);
        border: 1px solid rgba(52, 38, 24, 0.12);
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .stat-card {
        padding: 12px;
        border: 1px solid rgba(52, 38, 24, 0.14);
        border-radius: 16px;
        background: rgba(255, 251, 241, 0.78);
      }

      .stat-card small {
        display: block;
        color: var(--muted);
      }

      .stat-card b {
        color: var(--blue);
        font-size: 22px;
      }

      .game-grid,
      .stage-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .game-card,
      .stage-card {
        display: grid;
        gap: 10px;
        padding: 14px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 18px;
        background: rgba(255, 253, 245, 0.72);
      }

      .game-card h3,
      .stage-card h3 {
        margin: 0;
        color: var(--red);
        font-size: 18px;
      }

      .game-card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .choice-list {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .scope-switch {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .scope-button {
        grid-column: auto;
        width: auto;
        min-height: 0;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(52, 38, 24, 0.12);
        background: rgba(255, 251, 241, 0.76);
        color: var(--ink);
        text-align: left;
      }

      .scope-button.active {
        border-color: rgba(40, 104, 143, 0.34);
        background: rgba(231, 243, 249, 0.9);
      }

      .scope-button small {
        display: block;
        margin-top: 4px;
        line-height: 1.35;
        color: var(--muted);
      }

      .choice-card {
        border: 1px solid rgba(52, 38, 24, 0.12);
        border-radius: 14px;
        background: rgba(255, 251, 241, 0.76);
        overflow: hidden;
      }

      .choice-card summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 9px 11px;
        cursor: pointer;
        color: var(--blue);
        font-size: 14px;
        font-weight: 700;
        list-style: none;
      }

      .choice-card summary::-webkit-details-marker {
        display: none;
      }

      .choice-card summary::after {
        content: "+";
        color: var(--muted);
      }

      .choice-card[open] summary::after {
        content: "−";
      }

      .choice-body {
        padding: 9px 11px;
      }

      .effect-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .reference-group {
        padding: 16px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 20px;
        background: rgba(255, 253, 245, 0.72);
      }

      .reference-group details {
        border-top: 1px solid rgba(52, 38, 24, 0.1);
        margin-top: 10px;
        padding-top: 10px;
      }

      .reference-group details:first-of-type {
        border-top: 0;
        margin-top: 0;
        padding-top: 0;
      }

      .reference-group summary {
        cursor: pointer;
        list-style: none;
        color: var(--blue);
        font-weight: 700;
      }

      .reference-group summary::-webkit-details-marker {
        display: none;
      }

      .bazi-overview,
      .bazi-grid {
        display: grid;
        gap: 12px;
      }

      .bazi-overview {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-bottom: 12px;
      }

      .bazi-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .bazi-pillar {
        padding: 16px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 20px;
        background: rgba(255, 253, 245, 0.72);
      }

      .bazi-pillar h3 {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 14px;
      }

      .bazi-ganzhi {
        display: block;
        margin-bottom: 10px;
        color: var(--red);
        font-size: 28px;
        line-height: 1;
      }

      .life-luck {
        display: grid;
        gap: 14px;
        margin-top: 14px;
      }

      .luck-period {
        display: grid;
        grid-template-columns: 150px 1fr;
        gap: 12px;
        padding: 14px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 20px;
        background: rgba(255, 253, 245, 0.68);
      }

      .luck-period-head {
        display: grid;
        align-content: start;
        gap: 8px;
      }

      .luck-period-head strong {
        color: var(--red);
        font-size: 30px;
        line-height: 1;
      }

      .year-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        align-items: start;
      }

      .year-card {
        min-height: 126px;
        padding: 10px;
        border: 1px solid rgba(52, 38, 24, 0.12);
        border-radius: 14px;
        background: rgba(255, 253, 245, 0.78);
        cursor: pointer;
      }

      .year-card[open] {
        position: relative;
        z-index: 2;
        grid-column: 1 / -1;
        background: rgba(255, 249, 234, 0.94);
        box-shadow: inset 0 0 0 1px rgba(181, 66, 47, 0.18);
      }

      .year-card strong {
        display: block;
        color: var(--blue);
        font-size: 20px;
        line-height: 1;
      }

      .year-card summary {
        list-style: none;
      }

      .year-card summary::-webkit-details-marker {
        display: none;
      }

      .year-card small {
        display: block;
        margin: 7px 0;
        color: var(--muted);
      }

      .month-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        margin-top: 8px;
      }

      .month-card {
        padding: 8px;
        border-radius: 10px;
        background: rgba(201, 133, 45, 0.1);
      }

      .month-card[open] {
        position: relative;
        z-index: 3;
        grid-column: 1 / -1;
        background: rgba(255, 249, 234, 0.95);
        box-shadow: inset 0 0 0 1px rgba(201, 133, 45, 0.22);
      }

      .month-card b {
        display: block;
        color: var(--red);
        font-size: 15px;
        line-height: 1.1;
      }

      .flow-days {
        margin-top: 10px;
      }

      .flow-detail {
        display: grid;
        grid-template-columns: minmax(260px, 0.75fr) minmax(420px, 1.25fr);
        gap: 12px;
        align-items: start;
      }

      .day-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        max-height: 620px;
        overflow: auto;
        padding-right: 4px;
      }

      .day-card {
        padding: 8px;
        border: 1px solid rgba(52, 38, 24, 0.1);
        border-radius: 10px;
        background: rgba(255, 253, 245, 0.82);
        cursor: pointer;
        text-align: left;
      }

      .day-card.active {
        border-color: rgba(181, 66, 47, 0.38);
        background: rgba(181, 66, 47, 0.1);
      }

      .day-detail {
        min-height: 420px;
        padding: 12px;
        border: 1px solid rgba(52, 38, 24, 0.14);
        border-radius: 14px;
        background: rgba(255, 253, 245, 0.82);
      }

      .day-detail h3 {
        margin: 0 0 8px;
        color: var(--red);
        font-size: 24px;
      }

      .hour-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .hour-card {
        padding: 9px;
        border-radius: 10px;
        background: rgba(29, 93, 120, 0.08);
      }

      .flow-loading {
        padding: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .raw {
        max-height: 420px;
        overflow: auto;
        padding: 18px;
        border-radius: 18px;
        background: #211b16;
        color: #f8e8c8;
        font: 12px/1.65 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      @media (max-width: 900px) {
        .hero,
        .overview-grid,
        .summary,
        .bazi-overview,
        .bazi-grid,
        .horoscope-grid,
        .manual-grid,
        .level-grid,
        .knowledge-grid,
        .reference-list {
          grid-template-columns: 1fr;
        }

        .summary-strip {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .stat-grid,
        .game-grid,
        .stage-grid,
        .timeline-board {
          grid-template-columns: 1fr;
        }

        .workspace-nav,
        .workspace-section {
          padding: 18px;
        }

        .workspace-nav {
          gap: 8px;
        }

        .board {
          min-width: 820px;
          gap: 10px;
        }

        .palace {
          min-height: 184px;
          padding: 13px;
          border-radius: 20px;
        }

        .palace h2 {
          font-size: 19px;
        }

        .center-info h2 {
          font-size: 26px;
        }

        .center-info dl {
          font-size: 15px;
        }

        .star {
          padding: 4px 8px;
          font-size: 12px;
        }

        .brightness,
        .mutagen {
          min-width: 17px;
          height: 17px;
          font-size: 10px;
        }

        .meta {
          font-size: 12px;
        }

        .overview-card strong {
          font-size: 24px;
        }

        .reading-prompt code {
          max-height: 150px;
        }

        .manual-card,
        .topic-card,
        .reference-group,
        .knowledge-chip {
          padding: 13px;
        }
      }

      @media (max-width: 560px) {
        main {
          width: min(100% - 20px, 1180px);
          padding: 16px 0 34px;
        }

        .title-card,
        .control-card,
        .panel,
        .workspace-nav,
        .workspace-section {
          border-radius: 22px;
        }

        .title-card {
          padding: 24px;
        }

        h1 {
          font-size: clamp(38px, 15vw, 64px);
        }

        .subtitle {
          font-size: 15px;
          line-height: 1.7;
        }

        .workspace-nav,
        .workspace-section,
        .panel {
          padding: 16px;
        }

        .game-runbar,
        .game-stage-strip,
        .game-scene,
        .game-journal {
          padding: 12px;
          border-radius: 16px;
        }

        .reading-brief,
        .reading-prompt,
        .manual-card,
        .reference-group,
        .topic-card,
        .reading-section,
        .knowledge-chip,
        .level-card {
          padding: 12px;
          border-radius: 16px;
        }

        .reading-brief strong {
          font-size: 18px;
        }

        .reading-list,
        .topic-driver-list,
        .mini-list {
          line-height: 1.58;
        }

        .topic-takeaway,
        .manual-summary,
        .meta {
          font-size: 12px;
          line-height: 1.62;
        }

        .topic-section summary,
        .manual-section summary,
        .reference-group summary {
          padding: 8px 10px;
          font-size: 13px;
        }

        .topic-detail,
        .manual-detail {
          padding: 8px 10px;
        }

        .reading-prompt code {
          max-height: 108px;
          font-size: 11px;
          line-height: 1.5;
        }

        .reading-section summary {
          padding: 10px 12px;
          font-size: 13px;
        }

        .reading-section-body {
          padding: 0 12px 12px;
        }

        .reading-group h3 {
          font-size: 16px;
        }

        form {
          grid-template-columns: 1fr;
        }

        input,
        select,
        button {
          min-height: 46px;
          font-size: 16px;
        }

        .summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px;
        }

        .chip {
          padding: 13px;
          border-radius: 17px;
        }

        .chip strong {
          font-size: 16px;
        }

        .board-shell {
          display: none;
        }

        .board {
          min-width: 740px;
          gap: 8px;
        }

        .palace {
          min-height: 162px;
          padding: 11px;
          border-radius: 18px;
        }

        .palace header {
          gap: 6px;
          margin-bottom: 8px;
        }

        .palace h2 {
          font-size: 17px;
        }

        .center-info {
          gap: 12px;
          min-height: 376px;
          padding: 20px;
        }

        .center-info h2 {
          font-size: 22px;
        }

        .center-info dl {
          gap: 7px 10px;
          font-size: 13px;
        }

        .stars {
          gap: 5px;
          margin: 7px 0;
        }

        .star {
          padding: 3px 7px;
          font-size: 11px;
        }

        .brightness,
        .mutagen {
          min-width: 16px;
          height: 16px;
          font-size: 10px;
        }

        .meta {
          font-size: 11px;
          line-height: 1.55;
        }

        .mobile-palace-list {
          display: grid;
          margin-top: 0;
        }

        .horoscope-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .workspace-nav {
          display: grid;
          grid-template-columns: repeat(5, minmax(0, 1fr));
          gap: 6px;
          padding: 6px;
          margin-top: 14px;
        }

        .workspace-button {
          min-width: 0;
          min-height: 34px;
          padding: 0 8px;
          border-radius: 12px;
          font-size: 13px;
        }

        .game-stage-strip {
          grid-template-columns: 1fr;
        }

        .choice-list {
          grid-template-columns: 1fr;
        }

        .scope-switch {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .summary-strip {
          grid-template-columns: 1fr;
        }

        .overview-card,
        .insight-card,
        .manual-card,
        .level-card,
        .knowledge-chip,
        .reference-card,
        .topic-card {
          padding: 14px;
          border-radius: 16px;
        }

        .overview-card strong {
          font-size: 22px;
        }

        .reading-brief strong {
          font-size: 19px;
        }

        .reading-prompt code {
          max-height: 120px;
          font-size: 11px;
        }

        .bazi-grid,
        .luck-period {
          grid-template-columns: 1fr;
        }

        .year-grid {
          grid-template-columns: 1fr;
        }

        .year-card[open] {
          grid-column: 1 / -1;
        }

        .month-grid {
          grid-template-columns: 1fr;
        }

        .flow-detail,
        .day-grid,
        .hour-grid {
          grid-template-columns: 1fr;
        }

        .day-grid {
          max-height: none;
        }

        .day-detail {
          min-height: 0;
        }

        .raw {
          max-height: 300px;
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="title-card">
          <div>
            <span class="version-pill">Mingli 0.0.2</span>
            <p class="eyebrow">Zi Wei · BaZi · Life Game</p>
            <h1>东方命理<br>人生手册</h1>
            <p class="subtitle">
              用紫微斗数、八字与运限整理你的结构、阶段与选择模式。先看能理解的人生主线，再展开宫位、十神、格局和古籍依据。
            </p>
          </div>
          <p class="hero-note">
            这是非宿命论的结构化解读原型：它提供倾向、阶段和行动提示，不替代现实决策。
          </p>
        </div>

        <div class="control-card">
          <form id="form">
            <label>
              历法
              <select name="calendar">
                <option value="solar">阳历</option>
                <option value="lunar">农历</option>
              </select>
            </label>
            <label>
              出生日期
              <input name="date" type="date" value="1986-07-29">
            </label>
            <label>
              出生时间
              <input name="birthTime" type="time" value="07:30">
            </label>
            <label>
              出生地
              <input name="birthPlace" list="cityList" value="徐州" placeholder="输入城市名">
              <datalist id="cityList"></datalist>
            </label>
            <label class="checkbox-label">
              <input name="trueSolarTime" type="checkbox" value="true" checked>
              <span>使用真太阳时</span>
            </label>
            <label class="checkbox-label">
              <input name="daylightSaving" type="checkbox" value="true" checked>
              <span>使用夏令时</span>
            </label>
            <label>
              性别
              <select name="gender">
                <option>女</option>
                <option>男</option>
              </select>
            </label>
            <label>
              算法
              <select name="algorithm">
                <option value="default">默认：《紫微斗数全书》</option>
                <option value="zhongzhou">中州派</option>
              </select>
            </label>
            <button type="submit">生成我的命盘</button>
            <div class="status" id="status"></div>
          </form>
        </div>
      </section>

      <section class="workspace-nav" aria-label="排盘工作台导航">
        <button class="workspace-button active" type="button" data-view="overview">总览</button>
        <button class="workspace-button" type="button" data-view="chart">命盘</button>
        <button class="workspace-button" type="button" data-view="timeline">时间轴</button>
        <button class="workspace-button" type="button" data-view="reading">解读</button>
        <button class="workspace-button" type="button" data-view="game">人生游戏</button>
      </section>

      <section class="workspace">
        <section class="workspace-section active" id="view-overview">
          <div class="overview-grid">
            <div class="overview-stack">
              <div class="summary-strip" id="summary"></div>
              <div class="overview-card" id="overviewLead"></div>
            </div>
            <div class="insight-list" id="overviewInsights"></div>
          </div>
        </section>

        <section class="workspace-section" id="view-chart">
          <div class="chart-shell">
            <div class="panel">
              <h2>十二宫命盘</h2>
              <section class="board-shell" aria-label="紫微斗数十二宫横向滚动命盘">
                <div class="board" id="board"></div>
              </section>
              <section class="mobile-palace-list" id="mobilePalaces" aria-label="十二宫手机列表"></section>
            </div>
            <div class="panel">
              <h2>当前时点定位</h2>
              <div class="horoscope-grid" id="horoscope"></div>
            </div>
          </div>
        </section>

        <section class="workspace-section" id="view-timeline">
          <div class="timeline-shell">
            <div class="panel">
              <h2>当前时间轴</h2>
              <div id="timelineOverview"></div>
            </div>
            <div class="panel">
              <h2>八字详盘</h2>
              <div id="bazi"></div>
            </div>
          </div>
        </section>

        <section class="workspace-section" id="view-reading">
          <div class="panel">
            <h2>知识增强解读</h2>
            <div id="reading"></div>
          </div>
        </section>

        <section class="workspace-section" id="view-game">
          <div class="panel">
            <h2>人生游戏</h2>
            <div id="lifeGame"></div>
          </div>
        </section>
      </section>
    </main>

    <script>
      const form = document.querySelector('#form');
      const statusEl = document.querySelector('#status');
      const boardEl = document.querySelector('#board');
      const mobilePalacesEl = document.querySelector('#mobilePalaces');
      const horoscopeEl = document.querySelector('#horoscope');
      const readingEl = document.querySelector('#reading');
      const lifeGameEl = document.querySelector('#lifeGame');
      const baziEl = document.querySelector('#bazi');
      const cityListEl = document.querySelector('#cityList');
