<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>紫微斗数排盘 API Demo</title>
    <style>
      :root {
        --ink: #1f1a15;
        --muted: #766a5d;
        --paper: #fff8ea;
        --panel: rgba(255, 251, 239, 0.86);
        --line: rgba(61, 44, 26, 0.16);
        --gold: #c9852d;
        --red: #b5422f;
        --blue: #1d5d78;
        --green: #596f35;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
        background:
          radial-gradient(circle at 18% 14%, rgba(201, 133, 45, 0.22), transparent 28rem),
          radial-gradient(circle at 88% 8%, rgba(29, 93, 120, 0.2), transparent 24rem),
          linear-gradient(135deg, #f4dfb5 0%, #fff8ea 42%, #ead4a5 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.18;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 36px 36px;
      }

      main {
        position: relative;
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 42px 0 54px;
      }

      .hero {
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 22px;
        align-items: stretch;
      }

      .title-card,
      .control-card,
      .panel {
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 22px 70px rgba(56, 41, 21, 0.16);
        backdrop-filter: blur(10px);
      }

      .title-card {
        padding: 34px;
        overflow: hidden;
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--red);
        font-size: 14px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 7vw, 86px);
        line-height: 0.94;
        letter-spacing: -0.06em;
      }

      .subtitle {
        max-width: 620px;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.8;
      }

      .control-card {
        padding: 22px;
      }

      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 13px;
      }

      .checkbox-label {
        grid-template-columns: 18px 1fr;
        gap: 9px;
        align-items: center;
        padding-top: 22px;
      }

      input,
      select,
      button {
        width: 100%;
        border: 1px solid rgba(52, 38, 24, 0.18);
        border-radius: 16px;
        padding: 12px 13px;
        color: var(--ink);
        background: rgba(255, 253, 245, 0.86);
        font: inherit;
      }

      input[type="checkbox"] {
        width: 18px;
        min-height: 18px;
        padding: 0;
        accent-color: var(--red);
      }

      button {
        grid-column: 1 / -1;
        cursor: pointer;
        border: 0;
        color: #fff9ec;
        background: linear-gradient(135deg, var(--red), var(--gold));
        font-weight: 700;
        box-shadow: 0 12px 28px rgba(181, 66, 47, 0.22);
      }

      .status {
        grid-column: 1 / -1;
        min-height: 22px;
        color: var(--blue);
        font-size: 13px;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
        margin-top: 22px;
      }

      .chip {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(255, 253, 245, 0.68);
      }

      .chip small {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
      }

      .chip strong {
        font-size: 18px;
      }

      .board-shell {
        margin-top: 22px;
        overflow-x: auto;
        padding-bottom: 10px;
        -webkit-overflow-scrolling: touch;
        scrollbar-color: rgba(181, 66, 47, 0.5) rgba(255, 253, 245, 0.5);
      }

      .board {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        min-width: 920px;
      }

      .palace {
        min-height: 212px;
        padding: 16px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 22px;
        background: rgba(255, 253, 245, 0.74);
      }

      .palace.empty-slot {
        color: var(--ink);
        background: rgba(255, 253, 245, 0.5);
      }

      .center-info {
        display: grid;
        grid-column: 2 / span 2;
        grid-row: 2 / span 2;
        align-content: center;
        justify-items: center;
        gap: 16px;
        height: 100%;
        min-height: 436px;
        padding: 28px;
      }

      .center-info h2 {
        margin: 0;
        color: var(--red);
        font-size: 30px;
        line-height: 1;
      }

      .center-info dl {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px 16px;
        margin: 0;
        width: min(360px, 100%);
        font-size: 17px;
        line-height: 1.35;
      }

      .center-info dt {
        color: var(--muted);
      }

      .center-info dd {
        margin: 0;
        color: var(--ink);
        font-weight: 700;
      }

      .palace header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
        margin-bottom: 10px;
      }

      .palace h2 {
        margin: 0;
        font-size: 22px;
      }

      .branch {
        color: var(--red);
        font-weight: 700;
      }

      .stars {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin: 10px 0;
      }

      .star {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 9px;
        border-radius: 999px;
        background: rgba(201, 133, 45, 0.14);
        color: #5b3c15;
        font-size: 13px;
      }

      .star.major {
        background: rgba(181, 66, 47, 0.13);
        color: var(--red);
        font-weight: 700;
      }

      .star-name {
        line-height: 1;
      }

      .brightness,
      .mutagen {
        display: inline-grid;
        place-items: center;
        min-width: 18px;
        height: 18px;
        padding: 0 4px;
        border-radius: 999px;
        font-size: 11px;
        line-height: 1;
      }

      .brightness {
        border: 1px solid rgba(29, 93, 120, 0.26);
        color: var(--blue);
        background: rgba(29, 93, 120, 0.08);
        font-weight: 700;
      }

      .mutagen {
        color: #fff9ec;
        background: var(--red);
        font-weight: 800;
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      .mobile-palace-list {
        display: none;
        margin-top: 12px;
        gap: 10px;
      }

      .mobile-palace {
        display: grid;
        grid-template-columns: 78px 1fr;
        gap: 12px;
        padding: 14px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 20px;
        background: rgba(255, 253, 245, 0.72);
      }

      .mobile-palace-title {
        display: grid;
        align-content: start;
        gap: 4px;
      }

      .mobile-palace-title strong {
        font-size: 18px;
      }

      .mobile-palace-title span {
        color: var(--red);
        font-weight: 700;
      }

      .mobile-palace .stars {
        margin: 0 0 7px;
      }

      .panel {
        margin-top: 22px;
        padding: 22px;
      }

      .panel h2 {
        margin: 0 0 14px;
      }

      .horoscope-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
      }

      .reading-head {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
        gap: 12px;
        margin-bottom: 12px;
      }

      .reading-brief,
      .reading-prompt,
      .manual-card,
      .level-card {
        padding: 16px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 20px;
        background: rgba(255, 253, 245, 0.72);
      }

      .reading-brief strong {
        display: block;
        margin-bottom: 10px;
        color: var(--red);
        font-size: 22px;
        line-height: 1.25;
      }

      .reading-list {
        margin: 0;
        padding-left: 20px;
        color: var(--muted);
        line-height: 1.8;
      }

      .reading-prompt code {
        display: block;
        max-height: 188px;
        overflow: auto;
        color: var(--blue);
        font: 12px/1.65 ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre-wrap;
      }

      .manual-grid,
      .level-grid,
      .knowledge-grid,
      .reference-list {
        display: grid;
        gap: 12px;
      }

      .manual-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .level-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        margin-top: 12px;
      }

      .knowledge-grid,
      .reference-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-top: 12px;
      }

      .manual-card h3,
      .level-card h3,
      .reference-card h3 {
        margin: 0 0 7px;
        color: var(--red);
        font-size: 18px;
      }

      .manual-card small,
      .level-card small,
      .reference-card small {
        display: block;
        margin-bottom: 8px;
        color: var(--blue);
        font-weight: 700;
      }

      .knowledge-chip,
      .reference-card {
        padding: 14px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 18px;
        background: rgba(255, 253, 245, 0.72);
      }

      .knowledge-chip strong {
        display: block;
        margin-bottom: 6px;
        color: var(--red);
      }

      .bazi-overview,
      .bazi-grid {
        display: grid;
        gap: 12px;
      }

      .bazi-overview {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-bottom: 12px;
      }

      .bazi-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .bazi-pillar {
        padding: 16px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 20px;
        background: rgba(255, 253, 245, 0.72);
      }

      .bazi-pillar h3 {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 14px;
      }

      .bazi-ganzhi {
        display: block;
        margin-bottom: 10px;
        color: var(--red);
        font-size: 28px;
        line-height: 1;
      }

      .life-luck {
        display: grid;
        gap: 14px;
        margin-top: 14px;
      }

      .luck-period {
        display: grid;
        grid-template-columns: 150px 1fr;
        gap: 12px;
        padding: 14px;
        border: 1px solid rgba(52, 38, 24, 0.16);
        border-radius: 20px;
        background: rgba(255, 253, 245, 0.68);
      }

      .luck-period-head {
        display: grid;
        align-content: start;
        gap: 8px;
      }

      .luck-period-head strong {
        color: var(--red);
        font-size: 30px;
        line-height: 1;
      }

      .year-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        align-items: start;
      }

      .year-card {
        min-height: 126px;
        padding: 10px;
        border: 1px solid rgba(52, 38, 24, 0.12);
        border-radius: 14px;
        background: rgba(255, 253, 245, 0.78);
        cursor: pointer;
      }

      .year-card[open] {
        position: relative;
        z-index: 2;
        grid-column: 1 / -1;
        background: rgba(255, 249, 234, 0.94);
        box-shadow: inset 0 0 0 1px rgba(181, 66, 47, 0.18);
      }

      .year-card strong {
        display: block;
        color: var(--blue);
        font-size: 20px;
        line-height: 1;
      }

      .year-card summary {
        list-style: none;
      }

      .year-card summary::-webkit-details-marker {
        display: none;
      }

      .year-card small {
        display: block;
        margin: 7px 0;
        color: var(--muted);
      }

      .month-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        margin-top: 8px;
      }

      .month-card {
        padding: 8px;
        border-radius: 10px;
        background: rgba(201, 133, 45, 0.1);
      }

      .month-card[open] {
        position: relative;
        z-index: 3;
        grid-column: 1 / -1;
        background: rgba(255, 249, 234, 0.95);
        box-shadow: inset 0 0 0 1px rgba(201, 133, 45, 0.22);
      }

      .month-card b {
        display: block;
        color: var(--red);
        font-size: 15px;
        line-height: 1.1;
      }

      .flow-days {
        margin-top: 10px;
      }

      .flow-detail {
        display: grid;
        grid-template-columns: minmax(260px, 0.75fr) minmax(420px, 1.25fr);
        gap: 12px;
        align-items: start;
      }

      .day-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        max-height: 620px;
        overflow: auto;
        padding-right: 4px;
      }

      .day-card {
        padding: 8px;
        border: 1px solid rgba(52, 38, 24, 0.1);
        border-radius: 10px;
        background: rgba(255, 253, 245, 0.82);
        cursor: pointer;
        text-align: left;
      }

      .day-card.active {
        border-color: rgba(181, 66, 47, 0.38);
        background: rgba(181, 66, 47, 0.1);
      }

      .day-detail {
        min-height: 420px;
        padding: 12px;
        border: 1px solid rgba(52, 38, 24, 0.14);
        border-radius: 14px;
        background: rgba(255, 253, 245, 0.82);
      }

      .day-detail h3 {
        margin: 0 0 8px;
        color: var(--red);
        font-size: 24px;
      }

      .hour-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .hour-card {
        padding: 9px;
        border-radius: 10px;
        background: rgba(29, 93, 120, 0.08);
      }

      .flow-loading {
        padding: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .raw {
        max-height: 420px;
        overflow: auto;
        padding: 18px;
        border-radius: 18px;
        background: #211b16;
        color: #f8e8c8;
        font: 12px/1.65 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      @media (max-width: 900px) {
        .hero,
        .summary,
        .bazi-overview,
        .bazi-grid,
        .horoscope-grid,
        .reading-head,
        .manual-grid,
        .level-grid,
        .knowledge-grid,
        .reference-list {
          grid-template-columns: 1fr;
        }

        .board {
          min-width: 820px;
          gap: 10px;
        }

        .palace {
          min-height: 184px;
          padding: 13px;
          border-radius: 20px;
        }

        .palace h2 {
          font-size: 19px;
        }

        .center-info h2 {
          font-size: 26px;
        }

        .center-info dl {
          font-size: 15px;
        }

        .star {
          padding: 4px 8px;
          font-size: 12px;
        }

        .brightness,
        .mutagen {
          min-width: 17px;
          height: 17px;
          font-size: 10px;
        }

        .meta {
          font-size: 12px;
        }
      }

      @media (max-width: 560px) {
        main {
          width: min(100% - 20px, 1180px);
          padding: 16px 0 34px;
        }

        .title-card,
        .control-card,
        .panel {
          border-radius: 22px;
        }

        .title-card {
          padding: 24px;
        }

        h1 {
          font-size: clamp(38px, 15vw, 64px);
        }

        .subtitle {
          font-size: 15px;
          line-height: 1.7;
        }

        form {
          grid-template-columns: 1fr;
        }

        input,
        select,
        button {
          min-height: 46px;
          font-size: 16px;
        }

        .summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px;
        }

        .chip {
          padding: 13px;
          border-radius: 17px;
        }

        .chip strong {
          font-size: 16px;
        }

        .board-shell {
          margin-left: -10px;
          margin-right: -10px;
          padding: 0 10px 10px;
        }

        .board {
          min-width: 740px;
          gap: 8px;
        }

        .palace {
          min-height: 162px;
          padding: 11px;
          border-radius: 18px;
        }

        .palace header {
          gap: 6px;
          margin-bottom: 8px;
        }

        .palace h2 {
          font-size: 17px;
        }

        .center-info {
          gap: 12px;
          min-height: 376px;
          padding: 20px;
        }

        .center-info h2 {
          font-size: 22px;
        }

        .center-info dl {
          gap: 7px 10px;
          font-size: 13px;
        }

        .stars {
          gap: 5px;
          margin: 7px 0;
        }

        .star {
          padding: 3px 7px;
          font-size: 11px;
        }

        .brightness,
        .mutagen {
          min-width: 16px;
          height: 16px;
          font-size: 10px;
        }

        .meta {
          font-size: 11px;
          line-height: 1.55;
        }

        .mobile-palace-list {
          display: grid;
        }

        .horoscope-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .reading-brief strong {
          font-size: 19px;
        }

        .bazi-grid,
        .luck-period {
          grid-template-columns: 1fr;
        }

        .year-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .year-card[open] {
          grid-column: 1 / -1;
        }

        .month-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .flow-detail,
        .day-grid,
        .hour-grid {
          grid-template-columns: 1fr;
        }

        .day-grid {
          max-height: none;
        }

        .raw {
          max-height: 300px;
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="title-card">
          <p class="eyebrow">Zi Wei API Prototype</p>
          <h1>人生剧本<br>排盘底座</h1>
          <p class="subtitle">
            这里先不做 AI 解读，只验证一件事：输入出生信息后，后端用确定性规则返回命盘 JSON，前端把十二宫、大限和流年信息展示出来。
          </p>
        </div>

        <div class="control-card">
          <form id="form">
            <label>
              历法
              <select name="calendar">
                <option value="solar">阳历</option>
                <option value="lunar">农历</option>
              </select>
            </label>
            <label>
              出生日期
              <input name="date" type="date" value="1986-07-29">
            </label>
            <label>
              出生时间
              <input name="birthTime" type="time" value="07:30">
            </label>
            <label>
              出生地
              <input name="birthPlace" list="cityList" value="徐州" placeholder="输入城市名">
              <datalist id="cityList"></datalist>
            </label>
            <label class="checkbox-label">
              <input name="trueSolarTime" type="checkbox" value="true" checked>
              <span>使用真太阳时</span>
            </label>
            <label class="checkbox-label">
              <input name="daylightSaving" type="checkbox" value="true" checked>
              <span>使用夏令时</span>
            </label>
            <label>
              性别
              <select name="gender">
                <option>女</option>
                <option>男</option>
              </select>
            </label>
            <label>
              流年目标时间
              <input name="target" value="2023-8-19 3:12" placeholder="YYYY-M-D HH:mm">
            </label>
            <label>
              算法
              <select name="algorithm">
                <option value="default">默认：《紫微斗数全书》</option>
                <option value="zhongzhou">中州派</option>
              </select>
            </label>
            <button type="submit">生成排盘</button>
            <div class="status" id="status"></div>
          </form>
        </div>
      </section>

      <section class="board-shell" aria-label="紫微斗数十二宫横向滚动命盘">
        <div class="board" id="board"></div>
      </section>
      <section class="mobile-palace-list" id="mobilePalaces" aria-label="十二宫手机列表"></section>

      <section class="panel">
        <h2>运限快照</h2>
        <div class="horoscope-grid" id="horoscope"></div>
      </section>

      <section class="panel">
        <h2>解读草稿</h2>
        <div id="reading"></div>
      </section>

      <section class="panel">
        <h2>八字详盘</h2>
        <div id="bazi"></div>
      </section>

      <section class="panel">
        <h2>API 原始 JSON</h2>
        <pre class="raw" id="raw"></pre>
      </section>
    </main>

    <script>
      const form = document.querySelector('#form');
      const statusEl = document.querySelector('#status');
      const boardEl = document.querySelector('#board');
      const mobilePalacesEl = document.querySelector('#mobilePalaces');
      const horoscopeEl = document.querySelector('#horoscope');
      const readingEl = document.querySelector('#reading');
      const baziEl = document.querySelector('#bazi');
      const rawEl = document.querySelector('#raw');
      const cityListEl = document.querySelector('#cityList');
      let currentParams = new URLSearchParams(new FormData(form));

      const boardSlots = [
        3, 4, 5, 6,
        2, null, null, 7,
        1, null, null, 8,
        0, 11, 10, 9,
      ];

      const starLabel = (star, isMajor = false) => `
        <span class="star${isMajor ? ' major' : ''}">
          <span class="star-name">${star.name}</span>
          ${star.brightness ? `<span class="brightness">${star.brightness}</span>` : ''}
          ${star.mutagen ? `<span class="mutagen">${star.mutagen}</span>` : ''}
        </span>
      `;
      const adjectiveNames = (stars) => stars.map((star) => star.mutagen ? `${star.name}${star.mutagen}` : star.name);
      const visibleStars = (stars, limit = 6) => stars.slice(0, limit).map((star) => starLabel(star)).join('');
      const visibleMajorStars = (stars) => stars.length
        ? stars.map((star) => starLabel(star, true)).join('')
        : '<span class="star">空宫</span>';
      const centerInfo = (summary) => `
        <article class="palace empty-slot center-info">
          <h2>命盘信息</h2>
          <dl>
            <dt>阳历</dt><dd>${summary.solarDate || '-'}</dd>
            <dt>农历</dt><dd>${summary.lunarDate || '-'}</dd>
            <dt>四柱</dt><dd>${summary.chineseDate || '-'}</dd>
            <dt>时辰</dt><dd>${summary.time || '-'}</dd>
            <dt>生肖</dt><dd>${summary.zodiac || '-'}</dd>
            <dt>星座</dt><dd>${summary.sign || '-'}</dd>
            <dt>命主</dt><dd>${summary.soul || '-'}</dd>
            <dt>身主</dt><dd>${summary.body || '-'}</dd>
            <dt>五行局</dt><dd>${summary.fiveElementsClass || '-'}</dd>
          </dl>
        </article>
      `;

      const chip = (label, value) => `
        <div class="chip">
          <small>${label}</small>
          <strong>${value || '-'}</strong>
        </div>
      `;

      const hiddenSummary = (item) => item.hiddenGan.length
        ? `${item.hiddenGan.join('、')}（${item.hiddenShiShen.join('、')}）`
        : '-';

      const renderReading = (reading) => `
        <div class="reading-head">
          <div class="reading-brief">
            <strong>${reading.headline}</strong>
            <ul class="reading-list">
              ${reading.storyline.map((item) => `<li>${item}</li>`).join('')}
            </ul>
            <p class="meta">${reading.disclaimer}</p>
          </div>
          <div class="reading-prompt">
            <small>AI Prompt Seed</small>
            <code>${reading.aiPromptSeed.join('\n')}</code>
          </div>
        </div>
        <div class="manual-grid">
          ${reading.manual.map((chapter) => `
            <article class="manual-card">
              <h3>${chapter.title}</h3>
              <small>${chapter.subtitle}</small>
              <p class="meta">${chapter.body}</p>
            </article>
          `).join('')}
        </div>
        <div class="knowledge-grid">
          ${reading.knowledgeHits.map((item) => `
            <article class="knowledge-chip">
              <strong>${item.topic}</strong>
              <small>${item.source}</small>
              <p class="meta">${item.summary}</p>
            </article>
          `).join('')}
        </div>
        <div class="reference-list">
          ${reading.references.map((item) => `
            <article class="reference-card">
              <h3>${item.topic}</h3>
              <small>${item.source}</small>
              <p class="meta">${item.summary}</p>
            </article>
          `).join('')}
        </div>
        <div class="level-grid">
          ${reading.gameLevels.map((level) => `
            <article class="level-card">
              <h3>${level.name}</h3>
              <small>Level ${level.level}</small>
              <p class="meta">
                目标：${level.objective}<br>
                线索：${level.clue}<br>
                奖励：${level.reward}
              </p>
            </article>
          `).join('')}
        </div>
      `;

      const render = (data) => {
        let centerRendered = false;

        boardEl.innerHTML = boardSlots.map((index) => {
          if (index === null) {
            if (centerRendered) {
              return '';
            }

            centerRendered = true;
            return centerInfo(data.summary);
          }

          const palace = data.palaces[index];
          const adjective = adjectiveNames(palace.adjectiveStars);

          return `
            <article class="palace">
              <header>
                <h2>${palace.name}${palace.isBodyPalace ? ' · 身' : ''}</h2>
                <span class="branch">${palace.stem}${palace.branch}</span>
              </header>
              <div class="stars">
                ${visibleMajorStars(palace.majorStars)}
              </div>
              <div class="stars">
                ${visibleStars(palace.minorStars, 6)}
              </div>
              <p class="meta">
                大限：${palace.decadal.range[0]}-${palace.decadal.range[1]} 岁<br>
                长生：${palace.changsheng12 || '-'} ｜ 博士：${palace.boshi12 || '-'}<br>
                杂曜：${adjective.slice(0, 5).join('、') || '-'}
              </p>
            </article>
          `;
        }).join('');

        mobilePalacesEl.innerHTML = data.palaces.map((palace) => {
          const adjective = adjectiveNames(palace.adjectiveStars);

          return `
            <article class="mobile-palace">
              <div class="mobile-palace-title">
                <strong>${palace.name}${palace.isBodyPalace ? ' · 身' : ''}</strong>
                <span>${palace.stem}${palace.branch}</span>
                <small>${palace.decadal.range[0]}-${palace.decadal.range[1]} 岁</small>
              </div>
              <div>
                <div class="stars">${visibleMajorStars(palace.majorStars)}</div>
                <div class="stars">${visibleStars(palace.minorStars, 5)}</div>
                <p class="meta">长生：${palace.changsheng12 || '-'} ｜ 杂曜：${adjective.slice(0, 4).join('、') || '-'}</p>
              </div>
            </article>
          `;
        }).join('');

        const sections = [
          ['大限', data.horoscope.decadal],
          ['流年', data.horoscope.yearly],
          ['流月', data.horoscope.monthly],
          ['流日', data.horoscope.daily],
          ['流时', data.horoscope.hourly],
        ];

        horoscopeEl.innerHTML = sections.map(([label, item]) => `
          <div class="chip">
            <small>${label}</small>
            <strong>${item.heavenlyStem}${item.earthlyBranch}</strong>
            <p class="meta">四化：${item.mutagen.join('、')}</p>
          </div>
        `).join('');

        readingEl.innerHTML = renderReading(data.reading);

        baziEl.innerHTML = `
          <div class="bazi-overview">
            ${chip('四柱', data.bazi.eightChar)}
            ${chip('日主', `${data.bazi.dayMaster.stem} · ${data.bazi.dayMaster.element}`)}
            ${chip('胎元', `${data.bazi.palaces.taiYuan} · ${data.bazi.palaces.taiYuanNaYin}`)}
            ${chip('命宫', `${data.bazi.palaces.mingGong} · ${data.bazi.palaces.mingGongNaYin}`)}
          </div>
          <div class="bazi-grid">
            ${data.bazi.pillars.map((pillar) => `
              <article class="bazi-pillar">
                <h3>${pillar.label}</h3>
                <strong class="bazi-ganzhi">${pillar.ganzhi}</strong>
                <p class="meta">
                  天干：${pillar.gan}（${pillar.ganWuXing}，${pillar.ganShiShen}）<br>
                  地支：${pillar.zhi}（${pillar.zhiWuXing}）<br>
                  藏干：${pillar.hiddenGan.join('、') || '-'}<br>
                  支十神：${pillar.hiddenShiShen.join('、') || '-'}<br>
                  地势：${pillar.diShi} ｜ 纳音：${pillar.naYin}<br>
                  旬空：${pillar.xunKong}
                </p>
              </article>
            `).join('')}
          </div>
          <div class="life-luck">
            ${data.bazi.luck.daYun.map((period) => `
              <article class="luck-period">
                <div class="luck-period-head">
                  <small>${period.startYear}-${period.endYear}</small>
                  <strong>${period.ganZhi}</strong>
                  <p class="meta">
                    ${period.startAge}-${period.endAge}岁<br>
                    天干：${period.gan}（${period.ganWuXing}，${period.ganShiShen}）<br>
                    地支：${period.zhi}（${period.zhiWuXing}）<br>
                    藏干：${hiddenSummary(period)}<br>
                    纳音：${period.naYin}<br>
                    旬空：${period.xunKong}
                  </p>
                </div>
                <div class="year-grid">
                  ${period.liuNian.map((year) => `
                    <details class="year-card">
                      <summary>
                        <strong>${year.ganZhi}</strong>
                        <small>${year.year}年 · ${year.age}岁</small>
                      </summary>
                      <p class="meta">
                        ${year.gan}：${year.ganWuXing} · ${year.ganShiShen}<br>
                        ${year.zhi}：${year.zhiWuXing}<br>
                        藏干：${hiddenSummary(year)}<br>
                        纳音：${year.naYin}<br>
                        空亡：${year.xunKong}
                      </p>
                      <div class="month-grid">
                        ${year.liuYue.map((month) => `
                          <details class="month-card" data-flow-year="${year.year}" data-flow-month-index="${month.index}">
                            <summary><b>${month.monthName} ${month.ganZhi}</b></summary>
                            <p class="meta">
                              ${month.gan}：${month.ganShiShen}<br>
                              ${month.zhi}：${month.zhiWuXing}<br>
                              空亡：${month.xunKong}
                            </p>
                            <div class="flow-days"></div>
                          </details>
                        `).join('')}
                      </div>
                    </details>
                  `).join('')}
                </div>
              </article>
            `).join('')}
          </div>
        `;

        rawEl.textContent = JSON.stringify(data, null, 2);
      };

      const load = async () => {
        const params = new URLSearchParams(new FormData(form));
        currentParams = params;
        statusEl.textContent = '排盘中...';

        try {
          const response = await fetch(`/api/astrolabe?${params.toString()}`);
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || '请求失败');
          }

          render(data);
          const dstText = data.input.daylightSaving
            ? `，${data.input.daylightSavingMode === 'auto' ? '自动识别夏令时' : '手动指定夏令时'}，已折算为标准时间 ${data.input.normalizedBirth.standardTime}`
            : `，${data.input.daylightSavingMode === 'auto' ? '自动判定非夏令时' : '手动指定标准时'}`;
          const estimateText = data.input.normalizedBirth.estimatedFromTimeIndex
            ? '，未填出生时间时按时辰中点估算'
            : '';
          const solarText = data.input.trueSolarTime
            ? `，真太阳时 ${data.input.normalizedBirth.trueSolarClockTime}`
            : '';
          statusEl.textContent = `已生成：${data.summary.time}${dstText}${solarText}${estimateText}，命宫在${data.summary.soulPalaceBranch}，身宫在${data.summary.bodyPalaceBranch}`;
        } catch (error) {
          statusEl.textContent = error.message;
        }
      };

      const renderFlowDays = (data) => `
        <div class="flow-loading">${data.range.startTerm} ${data.range.startDate} 至 ${data.range.endTerm} ${data.range.endDate}</div>
        <div class="flow-detail">
          <div class="day-grid">
            ${data.days.map((day, index) => `
              <button class="day-card${index === 0 ? ' active' : ''}" type="button" data-day-index="${index}">
                <b>${day.ganZhi}</b>
                <small>${day.date} · 农历${day.lunarDate}</small>
                <span class="meta">${day.ganShiShen || '-'} ｜ ${day.naYin}</span>
              </button>
            `).join('')}
          </div>
          <div class="day-detail">
            ${renderDayDetail(data.days[0])}
          </div>
        </div>
      `;

      const renderDayDetail = (day) => `
        <h3>${day.date} · ${day.ganZhi}</h3>
        <p class="meta">
          农历：${day.lunarDate}<br>
          ${day.gan}：${day.ganWuXing} · ${day.ganShiShen}<br>
          ${day.zhi}：${day.zhiWuXing}<br>
          藏干：${hiddenSummary(day)}<br>
          纳音：${day.naYin} ｜ 空亡：${day.xunKong}<br>
          宜：${day.yi.slice(0, 6).join('、') || '-'}<br>
          忌：${day.ji.slice(0, 6).join('、') || '-'}
        </p>
        <div class="hour-grid">
          ${day.hours.map((hour) => `
            <div class="hour-card">
              <b>${hour.label} ${hour.ganZhi}</b>
              <p class="meta">
                ${hour.range}<br>
                ${hour.gan}：${hour.ganShiShen}<br>
                ${hour.zhi}：${hour.zhiWuXing}<br>
                空亡：${hour.xunKong}<br>
                ${hour.tianShen} · ${hour.tianShenType}
              </p>
            </div>
          `).join('')}
        </div>
      `;

      const loadCities = async () => {
        try {
          const response = await fetch('/api/cities');
          const data = await response.json();
          cityListEl.innerHTML = data.cities.map((city) => `<option value="${city.name}"></option>`).join('');
        } catch (error) {
          cityListEl.innerHTML = '';
        }
      };

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        load();
      });

      baziEl.addEventListener('toggle', async (event) => {
        const target = event.target;

        if (!target.matches('.month-card') || !target.open || target.dataset.loaded) {
          return;
        }

        const container = target.querySelector('.flow-days');
        const params = new URLSearchParams(currentParams);
        params.set('flowYear', target.dataset.flowYear);
        params.set('flowMonthIndex', target.dataset.flowMonthIndex);
        container.innerHTML = '<div class="flow-loading">加载流日流时...</div>';

        try {
          const response = await fetch(`/api/flow-days?${params.toString()}`);
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || '请求失败');
          }

          target.dataset.loaded = 'true';
          container.innerHTML = renderFlowDays(data);
          container.flowDays = data.days;
        } catch (error) {
          container.innerHTML = `<div class="flow-loading">${error.message}</div>`;
        }
      }, true);

      baziEl.addEventListener('click', (event) => {
        const button = event.target.closest('.day-card');

        if (!button) {
          return;
        }

        const container = button.closest('.flow-days');
        const detail = container.querySelector('.day-detail');
        const day = container.flowDays?.[Number(button.dataset.dayIndex)];

        if (!day) {
          return;
        }

        container.querySelectorAll('.day-card').forEach((item) => item.classList.remove('active'));
        button.classList.add('active');
        detail.innerHTML = renderDayDetail(day);
      });

      loadCities();
      load();
    </script>
  </body>
</html>
