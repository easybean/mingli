            summary: '这条路线会让你更容易拿到恢复窗口，但前提是你真的愿意停下来修系统。',
            dramaticText: '有些机会不是往外跑得更快，而是终于把自己从持续损耗里拉出来。',
            triggerSummary: '这是修复路线专属机会，会替换掉部分通用机会卡。',
            choices: [
              { label: '优先复位', style: 'repair', description: '先把作息、恢复和支持系统调回来。', cost: '短期推进速度会下降。', reward: '后续续航明显提升。', statEffects: { resilience: 8, stability: 2 }, feedback: '你把修复路线走到了核心，后面的关卡会少很多反复。' },
              { label: '边推进边调节', style: 'steady', description: '不完全停下，但给恢复留固定位置。', cost: '见效会慢一点。', reward: '不至于再一次性透支。', statEffects: { resilience: 4, stability: 3 }, feedback: '你开始给自己留恢复槽，后面的波动会缓一些。' },
              { label: '恢复后再提速', style: 'bold', description: '先借恢复窗口蓄力。', cost: '短期会有停顿感。', reward: '后面能更有力地重新推进。', statEffects: { agency: 3, resilience: 3, mobility: 2 }, feedback: '你让修复变成蓄力，后面路线有机会重新提速。' },
            ],
          },
        ],
      };

      const ROUTE_REPLACEMENT_THEMES = {
        bold: ['health', 'family', 'relationship'],
        steady: ['migration', 'mindset', 'relationship'],
        repair: ['career', 'migration', 'wealth'],
      };

      const STYLE_CARD_VARIANTS = {
        bold: {
          trialTitle: '强攻事件',
          opportunityTitle: '窗口事件',
          summaryPrefix: '这条路线会把当前局面推向更直接的抢位与承压判断。',
          dramaticPrefix: '你已经连续做了更主动的选择，后面的问题会更快来到台前。',
          choiceLead: '这一步更像在拿速度换空间。',
        },
        steady: {
          trialTitle: '稳盘事件',
          opportunityTitle: '沉淀事件',
          summaryPrefix: '这条路线会把当前局面推向秩序、留存与长期承接判断。',
          dramaticPrefix: '你已经连续做了更稳的选择，后面的事件会更强调底盘和持续性。',
          choiceLead: '这一步更像在拿耐心换稳定度。',
        },
        repair: {
          trialTitle: '修复事件',
          opportunityTitle: '回补事件',
          summaryPrefix: '这条路线会把当前局面推向收口损耗、修边界和降低复发判断。',
          dramaticPrefix: '你已经连续做了更偏修复的选择，后面的事件会更强调止损和回补。',
          choiceLead: '这一步更像在拿当下速度换后续可持续。',
        },
      };

      const dominantStyle = (state) => {
        const styles = Object.entries(state.styleCounts || {});
        const sorted = styles.sort((left, right) => right[1] - left[1] || left[0].localeCompare(right[0]));
        return sorted[0]?.[1] > 0 ? sorted[0][0] : 'steady';
      };

      const currentGameDeck = (lifeGame, state) => state.branchDeck || lifeGame.cards || [];

      const buildRouteVariantCard = (variant, cardNo) => ({
        ...variant,
        rank: cardNo,
        score: 999 - cardNo,
        strongHitCount: 4,
        matchedSignals: [variant.themeLabel, variant.title],
        cardNo,
      });

      const buildBranchDeck = (lifeGame, route, resolvedIds = []) => {
        const baseCards = (lifeGame.cards || []).map((card) => ({ ...card }));
        const variants = (ROUTE_VARIANT_LIBRARY[route] || []).map((variant, index) => buildRouteVariantCard(variant, 800 + index));
        const replaceThemes = ROUTE_REPLACEMENT_THEMES[route] || [];
        const nextCards = [...baseCards];
        let variantIndex = 0;

        nextCards.forEach((card, index) => {
          if (variantIndex >= variants.length) {
            return;
          }
          if (resolvedIds.includes(card.id)) {
            return;
          }
          if (!replaceThemes.includes(card.theme)) {
            return;
          }
          nextCards[index] = {
            ...variants[variantIndex],
            cardNo: card.cardNo,
          };
          variantIndex += 1;
        });

        return nextCards;
      };

      const nextPlayableCardId = (lifeGame, resolvedIds, fallbackId, preferredStyle = 'steady') => {
        const deck = currentGameDeck(lifeGame, { branchDeck: lifeGame.branchDeck });
        const remaining = deck.filter((card) => !resolvedIds.includes(card.id));
        if (!remaining.length) {
          return fallbackId || (deck?.[0]?.id || '');
        }
        if (fallbackId && remaining.some((card) => card.id === fallbackId)) {
          return fallbackId;
        }
        const preference = STYLE_THEME_PREFERENCES[preferredStyle] || STYLE_THEME_PREFERENCES.steady;
        const scored = remaining.map((card, index) => {
          const themeIndex = preference.indexOf(card.theme);
          let score = themeIndex === -1 ? 0 : (preference.length - themeIndex) * 10;
          if (preferredStyle === 'bold' && card.type === 'trial') {
            score += 3;
          }
          if (preferredStyle === 'steady' && ['wealth', 'career', 'family'].includes(card.theme)) {
            score += 2;
          }
          if (preferredStyle === 'repair' && ['health', 'relationship', 'mindset'].includes(card.theme)) {
            score += 2;
          }
          score += Math.max(0, 20 - index);
          return { card, score };
        }).sort((left, right) => right.score - left.score || left.card.cardNo - right.card.cardNo);
        return scored[0].card.id;
      };

      const currentStageIndex = (lifeGame, state) => {
        const total = Math.max(1, currentGameDeck(lifeGame, state).length);
        const progress = state.resolvedCardIds.length / total;
        return Math.min((lifeGame.stages || []).length - 1, Math.floor(progress * (lifeGame.stages || []).length));
      };

      const createLifeGameState = (lifeGame) => ({
        stats: cloneGameStats(lifeGame.stats),
        resolvedCardIds: [],
        decisions: [],
        branchRoute: 'steady',
        branchDeck: null,
        styleCounts: {
          bold: 0,
          steady: 0,
          repair: 0,
        },
        activeCardId: lifeGame.cards?.[0]?.id || '',
      });

      const adaptStageByState = (stage, state) => {
        const style = dominantStyle(state);
        const route = STYLE_GUIDANCE[style] || STYLE_GUIDANCE.steady;
        const variant = STYLE_STAGE_VARIANTS[style] || STYLE_STAGE_VARIANTS.steady;
        return {
          ...stage,
          routeId: style,
          routeLabel: route.label,
          routeSummary: route.stage,
          dynamicTitle: `${variant.prefix} · ${stage?.title || '人生阶段'}`,
          dynamicStrategy: `${stage?.strategy || ''}${stage?.strategy ? ' ' : ''}${variant.strategy}`,
        };
      };

      const adaptCardByState = (card, state) => {
        const style = dominantStyle(state);
        const route = STYLE_GUIDANCE[style] || STYLE_GUIDANCE.steady;
        const variant = STYLE_CARD_VARIANTS[style] || STYLE_CARD_VARIANTS.steady;
        const modifiers = [];
        if ((state.decisions || []).length > 0) {
          modifiers.push(route.card);
        }
        if (style === 'bold' && card.type === 'trial') {
          modifiers.push('这一步更适合先判断承压边界，再决定要不要抢窗口。');
        }
        if (style === 'steady' && ['wealth', 'career'].includes(card.theme)) {
          modifiers.push('这一步更适合先看留存和秩序，再决定是否继续扩大投入。');
        }
        if (style === 'repair' && ['relationship', 'health', 'mindset'].includes(card.theme)) {
          modifiers.push('这一步更适合先收口消耗，再考虑额外扩张。');
        }

        return {
          ...card,
          routeId: style,
          dynamicTitle: `${variant[card.type === 'trial' ? 'trialTitle' : 'opportunityTitle']} · ${card.title}`,
          dynamicSummary: `${STYLE_SUMMARY_BY_THEME[style]?.[card.theme] || ''} ${variant.summaryPrefix}`.trim(),
          dynamicDramaticText: `${variant.dramaticPrefix} ${card.dramaticText}`.trim(),
          dynamicChoiceLead: variant.choiceLead,
          dynamicHint: modifiers.join(' '),
          routeLabel: route.label,
          dynamicChoiceFeedbackPrefix: route.label,
        };
      };

      const renderStatGrid = (stats) => `
        <div class="stat-grid">
          ${Object.entries(STAT_LABELS).map(([key, label]) => `
            <article class="stat-card">
              <small>${label}</small>
              <b>${renderStatValue(stats[key])}</b>
            </article>
          `).join('')}
        </div>
      `;

      const renderLifeGame = (lifeGame, state) => {
        const deck = currentGameDeck(lifeGame, state);
        const activeCard = deck.find((card) => card.id === state.activeCardId) || deck[0];
        const stageIndex = currentStageIndex(lifeGame, state);
        const activeStage = adaptStageByState(lifeGame.stages?.[stageIndex], state);
        const isFinished = state.resolvedCardIds.length >= deck.length;
        const dynamicCard = activeCard ? adaptCardByState(activeCard, state) : null;
        const scopes = currentLifeGameBundle?.scopes || { [currentLifeGameScope]: lifeGame };
        return `
          <div class="reading-head">
            <div class="game-hero">
              <small class="meta">人生角色</small>
              <strong>${lifeGame.archetype.name}</strong>
              <p class="topic-takeaway">${lifeGame.headline}</p>
              <p class="meta">出生：${currentData?.summary?.solarDate || '-'} ${currentData?.summary?.time || ''} ｜ 定位：${currentData?.horoscope?.target || '-'} ｜ 当前年龄：${currentData?.horoscope?.currentAge ?? '-' } 岁</p>
              <div class="scope-switch">
                ${Object.entries(scopes).map(([scopeId, item]) => `
                  <button
                    class="scope-button ${scopeId === currentLifeGameScope ? 'active' : ''}"
                    type="button"
                    data-game-scope="${scopeId}"
                  >
                    <strong>${item.scopeLabel || scopeId}</strong>
                    <small>${item.focusLabel || item.scopeSummary || ''}</small>
                  </button>
                `).join('')}
              </div>
              ${renderStatGrid(state.stats)}
              <p class="meta">${lifeGame.disclaimer}</p>
            </div>
          </div>
          <div class="reading-group">
            <h3>当前这一局</h3>
            <div class="game-runbar">
              <div>
                <strong>${isFinished ? '这一轮已收束' : `当前关卡：${activeStage?.title || '人生主线'}`}</strong>
                <p class="meta">已完成 ${state.resolvedCardIds.length} / ${deck.length} 个事件。${activeStage ? `当前阶段：${activeStage.ageRange} · ${activeStage.ganZhi}。` : ''}</p>
                <p class="meta">${lifeGame.scopeLabel || '一生'}模式：${lifeGame.focusLabel || lifeGame.scopeSummary || ''}</p>
                <p class="meta">本轮已展开 ${lifeGame.scale?.stages || (lifeGame.stages || []).length} 个阶段，当前人生地图会延伸到 ${lifeGame.stages?.at(-1)?.ageRange || '-'}。</p>
              </div>
              <div class="game-runbar-actions">
                <button class="ghost-button" type="button" data-game-action="reset">重新开局</button>
              </div>
            </div>
          </div>
          <div class="reading-group">
            <h3>阶段推进</h3>
            <div class="game-stage-strip">
              ${(lifeGame.stages || []).map((stage, index) => `
                <article class="game-stage-pill ${index < stageIndex ? 'done' : ''} ${index === stageIndex ? 'active' : ''}">
                  <strong>${stage.title}</strong>
                  <small>Level ${stage.level} · ${stage.ageRange}</small>
                  <p class="meta">${stage.strategy}</p>
                </article>
              `).join('')}
            </div>
          </div>
          <div class="reading-group">
            <h3>选择你的下一步</h3>
            <div class="game-play-grid">
              <div class="game-scene-main">
                <article class="game-scene-side-card">
                  <strong>${activeStage?.dynamicTitle || activeStage?.title || '人生主线'}</strong>
                  <p class="meta">${activeStage?.triggerSummary || '当前没有阶段信息。'}</p>
                  <p class="meta">推荐策略：${activeStage?.dynamicStrategy || activeStage?.strategy || '继续观察当前主线。'}</p>
                  <p class="meta">当前路线：${activeStage?.routeLabel || '稳健路线'}。${activeStage?.routeSummary || ''}</p>
                </article>
                <article class="game-route-banner">
                  <strong>分支已经开始变化</strong>
                  <p class="meta">你当前走的是 <b>${activeStage?.routeLabel || '稳健路线'}</b>。这会改变后续事件优先级，也会替换掉部分后续关卡。</p>
                  ${dynamicCard?.dynamicSummary ? `<p class="meta">${dynamicCard.dynamicSummary}</p>` : ''}
                </article>
                <article class="game-scene">
                  ${dynamicCard ? `
                    <div class="game-scene-head">
                      <div>
                        <h3>${dynamicCard.dynamicTitle || dynamicCard.title}</h3>
                        <small>${dynamicCard.themeLabel} · ${dynamicCard.type === 'trial' ? '试炼' : '机会'}</small>
                      </div>
                      <span class="tag ${dynamicCard.type === 'trial' ? 'tag-bad' : 'tag-good'}">${dynamicCard.type === 'trial' ? '试炼' : '机会'}</span>
                    </div>
                    <p class="topic-takeaway">${dynamicCard.dynamicSummary || dynamicCard.summary}</p>
                    <p class="meta">${dynamicCard.dynamicDramaticText || dynamicCard.dramaticText}</p>
                    <p class="meta">${dynamicCard.triggerSummary}</p>
                    ${dynamicCard.dynamicHint ? `<p class="meta">${dynamicCard.dynamicHint}</p>` : ''}
                    ${state.resolvedCardIds.includes(dynamicCard.id) ? `
                      <div class="empty-card">
                        <p class="meta">这一题已经结算完成。重新开局可以重走一轮。</p>
                      </div>
                    ` : `
                      <div class="choice-list">
                        ${dynamicCard.choices.map((choice, choiceIndex) => `
                          <button
                            class="choice-action ${choice.style}"
                            type="button"
                            data-game-choice="${dynamicCard.id}:${choiceIndex}"
                          >
                            <strong>${choice.label}</strong>
                            <small>${choice.description}</small>
                            <span class="meta">${dynamicCard.dynamicChoiceLead}</span>
                            <span class="meta">代价：${choice.cost}</span>
                            <span class="meta">收益：${choice.reward}</span>
                            <div class="effect-list">${renderChoiceEffects(choice.statEffects)}</div>
                          </button>
                        `).join('')}
                      </div>
                    `}
                  ` : `
                    <div class="empty-card">
                      <p class="meta">当前没有可推进的事件。</p>
                    </div>
                  `}
                </article>
              </div>
            </div>
          </div>
          <div class="reading-group">
            <h3>行动日志</h3>
            <div class="game-journal">
              ${state.decisions.length ? `
                <div class="journal-list">
                  ${state.decisions.map((entry, index) => `
                    <article class="journal-item">
                      <strong>${index + 1}. ${entry.cardTitle} · ${entry.choiceLabel}</strong>
                      <p class="meta">${entry.feedback}</p>
                      <div class="effect-list">${renderChoiceEffects(entry.statEffects)}</div>
                    </article>
                  `).join('')}
                </div>
              ` : `
                <p class="meta">这一轮还没开始。先处理当前关卡，再决定你要走激进、稳健还是修复路线。</p>
              `}
            </div>
          </div>
          <div class="reading-group">
            <h3>阶段关卡</h3>
            <div class="stage-grid">
              ${lifeGame.stages.map((stage) => `
                <article class="stage-card">
                  <h3>${stage.title}</h3>
                  <small>Level ${stage.level} · ${stage.ageRange} · ${stage.ganZhi}</small>
                  <p class="meta">${stage.triggerSummary}</p>
                  <p class="meta">可能课题：${stage.possibleThemes.join('、') || '继续观察命盘主线'}</p>
                  <p class="meta">推荐策略：${stage.strategy}</p>
                </article>
              `).join('')}
            </div>
          </div>
        `;
      };

      const rerenderLifeGame = () => {
        const lifeGame = selectedLifeGame();
        if (!lifeGame || !currentLifeGameState) {
          return;
        }
        lifeGameEl.innerHTML = renderLifeGame(lifeGame, currentLifeGameState);
      };

      const applyGameChoice = (cardId, choiceIndex) => {
        const lifeGame = selectedLifeGame();
        if (!lifeGame || !currentLifeGameState) {
          return;
        }
        if (currentLifeGameState.resolvedCardIds.includes(cardId)) {
          return;
        }
        const card = gameCardById(lifeGame, currentLifeGameState, cardId);
        const choice = card?.choices?.[choiceIndex];
        if (!card || !choice) {
          return;
        }

        Object.entries(choice.statEffects || {}).forEach(([key, value]) => {
          currentLifeGameState.stats[key] = renderStatValue((currentLifeGameState.stats[key] || 0) + value);
        });

        currentLifeGameState.resolvedCardIds.push(cardId);
        currentLifeGameState.styleCounts[choice.style] = (currentLifeGameState.styleCounts[choice.style] || 0) + 1;
        currentLifeGameState.decisions.push({
          cardId,
          cardTitle: card.title,
          choiceLabel: choice.label,
          feedback: `${STYLE_GUIDANCE[choice.style]?.label || '当前路线'}：${choice.feedback}`,
          style: choice.style,
          statEffects: choice.statEffects || {},
        });
        currentLifeGameState.branchRoute = dominantStyle(currentLifeGameState);
        currentLifeGameState.branchDeck = buildBranchDeck(
          lifeGame,
          currentLifeGameState.branchRoute,
          currentLifeGameState.resolvedCardIds,
        );
        currentLifeGameState.activeCardId = nextPlayableCardId(
          {
            ...lifeGame,
            branchDeck: currentLifeGameState.branchDeck,
          },
          currentLifeGameState.resolvedCardIds,
          '',
          dominantStyle(currentLifeGameState),
        );
        rerenderLifeGame();
      };

      lifeGameEl.addEventListener('click', (event) => {
        const scopeButton = event.target.closest('[data-game-scope]');
        if (scopeButton && currentLifeGameBundle) {
          currentLifeGameScope = scopeButton.dataset.gameScope;
          currentLifeGameState = createLifeGameState(selectedLifeGame());
          rerenderLifeGame();
          return;
        }

        const resetButton = event.target.closest('[data-game-action="reset"]');
        if (resetButton && selectedLifeGame()) {
          currentLifeGameState = createLifeGameState(selectedLifeGame());
          rerenderLifeGame();
          return;
        }

        const choiceButton = event.target.closest('[data-game-choice]');
        if (choiceButton) {
          const [cardId, choiceIndexText] = choiceButton.dataset.gameChoice.split(':');
          applyGameChoice(cardId, Number(choiceIndexText));
        }
      });

      const renderReading = (reading) => {
        const baziManual = reading.manual.find((chapter) => plainChapterTitle(chapter.title) === '八字基础');
        const shenManual = reading.manual.find((chapter) => plainChapterTitle(chapter.title) === '身宫');
        const ziweiManual = reading.manual.filter((chapter) => !['八字基础', '身宫'].includes(plainChapterTitle(chapter.title)));
        const referenceGroups = buildReferenceGroups(reading);

        return `
        <div class="reading-head">
          <div class="reading-brief">
            <strong>${reading.headline}</strong>
            <ul class="reading-list">
              ${reading.storyline.map((item) => `<li>${item}</li>`).join('')}
            </ul>
            <p class="meta">${reading.disclaimer}</p>
          </div>
        </div>
        <details class="reading-section">
          <summary>AI Prompt Seed</summary>
          <div class="reading-section-body">
            <div class="reading-prompt">
              <code>${reading.aiPromptSeed.join('\n')}</code>
            </div>
          </div>
        </details>
        ${baziManual ? `
          <div class="reading-group">
            <h3>八字解读</h3>
            <div class="manual-grid">
              <article class="manual-card">
                <div class="manual-header">
                  <h3>${plainChapterTitle(baziManual.title)}</h3>
                  <small>${baziManual.subtitle}</small>
                </div>
                <p class="manual-summary">${briefText(baziManual.body, 3, 132)}</p>
                ${baziManual.references?.length ? `<p class="meta">依据：${summarizeChapterReferences(baziManual.references)}</p>` : ''}
                <details class="manual-section">
                  <summary>完整章节</summary>
                  <div class="manual-detail">
                    <p class="meta">${baziManual.body}</p>
                  </div>
                </details>
                ${baziManual.knowledgeHits?.length ? `
                  <details class="manual-section">
                    <summary>命中要点</summary>
                    <div class="manual-detail">
                      <ul class="topic-driver-list">
                        ${baziManual.knowledgeHits.map((item) => `<li>${item.topic}：${item.summary}</li>`).join('')}
                      </ul>
                    </div>
                  </details>
                ` : ''}
                ${baziManual.patterns?.length ? `
                  <details class="manual-section">
                    <summary>关联格局</summary>
                    <div class="manual-detail">
                      <ul class="topic-driver-list">
                        ${baziManual.patterns.map((item) => `<li>${item.name}：${item.summary}</li>`).join('')}
                      </ul>
                    </div>
                  </details>
                ` : ''}
                ${baziManual.hooks?.length ? `
                  <details class="manual-section">
                    <summary>生成线索</summary>
                    <div class="manual-detail">
                      <ul class="topic-driver-list">
                        ${baziManual.hooks.slice(0, 4).map((item) => `<li>${item}</li>`).join('')}
                      </ul>
                    </div>
                  </details>
                ` : ''}
              </article>
            </div>
          </div>
        ` : ''}
        <div class="reading-group">
          <h3>紫微十二宫</h3>
          <div class="manual-grid">
          ${ziweiManual.map((chapter) => `
            <article class="manual-card">
              <div class="manual-header">
                <h3>${plainChapterTitle(chapter.title)}</h3>
                <small>${chapter.subtitle}</small>
              </div>
              <p class="manual-summary">${briefText(chapter.body, 2, 96)}</p>
              ${chapter.references?.length ? `<p class="meta">依据：${summarizeChapterReferences(chapter.references)}</p>` : ''}
              <details class="manual-section">
                <summary>完整章节</summary>
                <div class="manual-detail">
                  <p class="meta">${chapter.body}</p>
                </div>
              </details>
              ${chapter.knowledgeHits?.length ? `
                <details class="manual-section">
                  <summary>命中要点</summary>
                  <div class="manual-detail">
                    <ul class="topic-driver-list">
                      ${chapter.knowledgeHits.map((item) => `<li>${item.topic}：${item.summary}</li>`).join('')}
                    </ul>
                  </div>
                </details>
              ` : ''}
              ${chapter.patterns?.length ? `
                <details class="manual-section">
                  <summary>关联格局</summary>
                  <div class="manual-detail">
                    <ul class="topic-driver-list">
                      ${chapter.patterns.map((item) => `<li>${item.name}：${item.summary}</li>`).join('')}
                    </ul>
                  </div>
                </details>
              ` : ''}
              ${chapter.hooks?.length ? `
                <details class="manual-section">
                  <summary>生成线索</summary>
                  <div class="manual-detail">
                    <ul class="topic-driver-list">
                      ${chapter.hooks.slice(0, 4).map((item) => `<li>${item}</li>`).join('')}
                    </ul>
                  </div>
                </details>
              ` : ''}
            </article>
          `).join('')}
          </div>
        </div>
        ${shenManual ? `
          <div class="reading-group">
            <h3>身宫说明</h3>
            <div class="manual-grid">
              <article class="manual-card">
                <div class="manual-header">
                  <h3>${plainChapterTitle(shenManual.title)}</h3>
                  <small>${shenManual.subtitle}</small>
                </div>
                <p class="manual-summary">${briefText(shenManual.body, 2, 96)}</p>
                ${shenManual.references?.length ? `<p class="meta">依据：${summarizeChapterReferences(shenManual.references)}</p>` : ''}
                <details class="manual-section">
                  <summary>完整章节</summary>
                  <div class="manual-detail">
                    <p class="meta">${shenManual.body}</p>
                  </div>
                </details>
                ${shenManual.knowledgeHits?.length ? `
                  <details class="manual-section">
                    <summary>命中要点</summary>
                    <div class="manual-detail">
                      <ul class="topic-driver-list">
                        ${shenManual.knowledgeHits.map((item) => `<li>${item.topic}：${item.summary}</li>`).join('')}
                      </ul>
                    </div>
                  </details>
                ` : ''}
                ${shenManual.patterns?.length ? `
                  <details class="manual-section">
                    <summary>关联格局</summary>
                    <div class="manual-detail">
                      <ul class="topic-driver-list">
                        ${shenManual.patterns.map((item) => `<li>${item.name}：${item.summary}</li>`).join('')}
                      </ul>
                    </div>
                  </details>
                ` : ''}
                ${shenManual.hooks?.length ? `
                  <details class="manual-section">
                    <summary>生成线索</summary>
                    <div class="manual-detail">
                      <ul class="topic-driver-list">
                        ${shenManual.hooks.slice(0, 4).map((item) => `<li>${item}</li>`).join('')}
                      </ul>
                    </div>
                  </details>
                ` : ''}
              </article>
            </div>
          </div>
        ` : ''}
        <div class="reading-group">
          <h3>紫微格局</h3>
          <p class="meta">第一批已实现 ${reading.patternPlan?.stage1?.implemented || 0} 个高频格局；第二批已实现 ${reading.patternPlan?.stage2?.implemented || 0} 个，待补 ${reading.patternPlan?.stage2?.backlog?.length || 0} 个。</p>
          ${reading.patterns?.length ? `
            <div class="topic-grid">
              ${reading.patterns.map((pattern) => `
                <article class="topic-card">
                  <div class="topic-header">
                    <strong>${pattern.name}</strong>
                    <span class="${patternBadgeClass(pattern.verdict)}">${pattern.verdict}</span>
                  </div>
                  <p class="meta">规则级别：<span class="${ruleLevelBadgeClass(pattern.ruleLevel)}">${pattern.ruleLevelLabel}</span></p>
                  <p class="topic-takeaway">${pattern.summary}</p>
                  ${pattern.sources?.length ? `<p class="meta">来源：${pattern.sources.join('、')}</p>` : ''}
                  ${pattern.detail ? `
                    <details class="topic-section">
                      <summary>格局说明</summary>
                      <div class="topic-detail">
                        <p class="meta">${pattern.detail}</p>
                      </div>
                    </details>
                  ` : ''}
                  ${pattern.conditions?.length ? `
                    <details class="topic-section">
                      <summary>入格条件</summary>
                      <div class="topic-detail">
                        <ul class="topic-driver-list">
                          ${pattern.conditions.map((item) => `<li>${item}</li>`).join('')}
                        </ul>
                      </div>
                    </details>
                  ` : ''}
                  ${pattern.caveats?.length ? `
                    <details class="topic-section">
                      <summary>破格与限制</summary>
                      <div class="topic-detail">
                        <ul class="topic-driver-list">
                          ${pattern.caveats.map((item) => `<li>${item}</li>`).join('')}
                        </ul>
                      </div>
                    </details>
                  ` : ''}
                </article>
              `).join('')}
            </div>
          ` : `
            <div class="empty-card">
              <p class="meta">当前样例没有命中第一批高频格局，后续可继续补更细的入格条件和第二批扩展格局。</p>
            </div>
          `}
        </div>
        <div class="reading-group">
          <h3>综合主线</h3>
          <div class="topic-grid">
          ${reading.topics.map((topic) => `
            <article class="topic-card">
              <div class="topic-header">
                <strong>${topic.title}</strong>
                <small>${topic.focus}</small>
              </div>
              <p class="topic-takeaway">${topic.takeaway || topic.summary}</p>
              <details class="topic-section">
                <summary>结构原因</summary>
                <div class="topic-detail">
                  <ul class="topic-driver-list">
                    ${(topic.drivers || []).map((item) => `<li>${item}</li>`).join('')}
                  </ul>
                </div>
              </details>
              ${(topic.ziweiStructure || []).length ? `
                <details class="topic-section">
                  <summary>紫微结构</summary>
                  <div class="topic-detail">
                    <ul class="topic-driver-list">
                      ${topic.ziweiStructure.map((item) => `<li>${item}</li>`).join('')}
                    </ul>
                  </div>
                </details>
              ` : ''}
              ${(topic.baziStructure || []).length ? `
                <details class="topic-section">
                  <summary>八字结构</summary>
                  <div class="topic-detail">
                    <ul class="topic-driver-list">
                      ${topic.baziStructure.map((item) => `<li>${item}</li>`).join('')}
                    </ul>
                  </div>
                </details>
              ` : ''}
              ${(topic.patterns || []).length ? `
                <details class="topic-section">
                  <summary>关联格局</summary>
                  <div class="topic-detail">
                    <ul class="topic-driver-list">
                      ${topic.patterns.map((item) => `<li>${item.name}：${item.summary}</li>`).join('')}
                    </ul>
                  </div>
                </details>
              ` : ''}
              <details class="topic-section">
                <summary>辅助线索</summary>
                <div class="topic-detail">
                  <ul class="topic-driver-list">
                    ${topic.cues.map((item) => `<li>${item}</li>`).join('')}
                  </ul>
                </div>
              </details>
            </article>
          `).join('')}
          </div>
        </div>
        <details class="reading-section">
          <summary>知识命中</summary>
          <div class="reading-section-body">
            <div class="knowledge-grid">
              ${reading.knowledgeHits.map((item) => `
                <article class="knowledge-chip">
                  <strong>${item.topic}</strong>
                  <small>${item.source}</small>
                  <p class="meta">${item.summary}</p>
                </article>
              `).join('')}
            </div>
          </div>
        </details>
        <details class="reading-section">
          <summary>检索片段</summary>
          <div class="reading-section-body">
            <div class="reference-list">
              ${reading.retrieval.map((item) => `
                <article class="reference-card">
                  <h3>检索片段</h3>
                  <small>${item.source}</small>
                  <p class="meta">${item.summary}</p>
                </article>
              `).join('')}
            </div>
          </div>
        </details>
        <details class="reading-section">
          <summary>专题依据</summary>
          <div class="reading-section-body">
            <div class="reference-list">
              ${referenceGroups.map((group) => `
                <article class="reference-group">
                  <h3>${group.title}</h3>
                  ${group.items.map((item) => `
                    <details>
                      <summary>${item.source} · ${item.topic}</summary>
                      <div class="meta">
                        ${item.summary}
                      </div>
                    </details>
                  `).join('')}
                </article>
              `).join('')}
            </div>
          </div>
        </details>
        <div class="level-grid">
          ${reading.gameLevels.map((level) => `
            <article class="level-card">
              <h3>${level.name}</h3>
              <small>Level ${level.level}</small>
              <p class="meta">
                目标：${level.objective}<br>
                线索：${level.clue}<br>
                奖励：${level.reward}
              </p>
            </article>
          `).join('')}
        </div>
      `;
      };

      const render = (data) => {
        let centerRendered = false;
        currentData = data;

        renderOverview(data);
        renderTimelineOverview(data);

        boardEl.innerHTML = boardSlots.map((index) => {
          if (index === null) {
            if (centerRendered) {
              return '';
            }

            centerRendered = true;
            return centerInfo(data.summary);
          }

          const palace = data.palaces[index];
          const adjective = adjectiveNames(palace.adjectiveStars);

          return `
            <article class="palace">
              <header>
                <h2>${palace.name}${palace.isBodyPalace ? ' · 身' : ''}</h2>
                <span class="branch">${palace.stem}${palace.branch}</span>
              </header>
              <div class="stars">
                ${visibleMajorStars(palace.majorStars)}
              </div>
              <div class="stars">
                ${visibleStars(palace.minorStars, 6)}
              </div>
              <p class="meta">
                大限：${palace.decadal.range[0]}-${palace.decadal.range[1]} 岁<br>
                长生：${palace.changsheng12 || '-'} ｜ 博士：${palace.boshi12 || '-'}<br>
                杂曜：${adjective.slice(0, 5).join('、') || '-'}
              </p>
            </article>
          `;
        }).join('');

        mobilePalacesEl.innerHTML = data.palaces.map((palace) => {
          const adjective = adjectiveNames(palace.adjectiveStars);

          return `
            <article class="mobile-palace">
              <div class="mobile-palace-title">
                <strong>${palace.name}${palace.isBodyPalace ? ' · 身' : ''}</strong>
                <span>${palace.stem}${palace.branch}</span>
                <small>${palace.decadal.range[0]}-${palace.decadal.range[1]} 岁</small>
              </div>
              <div>
                <div class="stars">${visibleMajorStars(palace.majorStars)}</div>
                <div class="stars">${visibleStars(palace.minorStars, 5)}</div>
                <p class="meta">长生：${palace.changsheng12 || '-'} ｜ 杂曜：${adjective.slice(0, 4).join('、') || '-'}</p>
              </div>
            </article>
          `;
        }).join('');

        const sections = [
          ['大限', data.horoscope.decadal],
          ['流年', data.horoscope.yearly],
          ['流月', data.horoscope.monthly],
          ['流日', data.horoscope.daily],
          ['流时', data.horoscope.hourly],
        ];

        horoscopeEl.innerHTML = sections.map(([label, item]) => `
          <div class="chip">
            <small>${label}</small>
            <strong>${item.heavenlyStem}${item.earthlyBranch}</strong>
            <p class="meta">四化：${item.mutagen.join('、')}</p>
          </div>
        `).join('');

        readingEl.innerHTML = renderReading(data.reading);
        currentLifeGameBundle = data.reading.lifeGame;
        currentLifeGameScope = data.reading.lifeGame?.currentScope || 'lifetime';
        currentLifeGameState = createLifeGameState(selectedLifeGame());
        rerenderLifeGame();

        baziEl.innerHTML = `
          <div class="bazi-overview">
            ${chip('四柱', data.bazi.eightChar)}
            ${chip('日主', `${data.bazi.dayMaster.stem} · ${data.bazi.dayMaster.element}`)}
            ${chip('胎元', `${data.bazi.palaces.taiYuan} · ${data.bazi.palaces.taiYuanNaYin}`)}
            ${chip('命宫', `${data.bazi.palaces.mingGong} · ${data.bazi.palaces.mingGongNaYin}`)}
          </div>
          <div class="bazi-grid">
            ${data.bazi.pillars.map((pillar) => `
              <article class="bazi-pillar">
                <h3>${pillar.label}</h3>
                <strong class="bazi-ganzhi">${pillar.ganzhi}</strong>
                <p class="meta">
                  天干：${pillar.gan}（${pillar.ganWuXing}，${pillar.ganShiShen}）<br>
                  地支：${pillar.zhi}（${pillar.zhiWuXing}）<br>
                  藏干：${pillar.hiddenGan.join('、') || '-'}<br>
                  支十神：${pillar.hiddenShiShen.join('、') || '-'}<br>
                  地势：${pillar.diShi} ｜ 纳音：${pillar.naYin}<br>
                  旬空：${pillar.xunKong}
                </p>
              </article>
            `).join('')}
          </div>
          <div class="life-luck">
            ${data.bazi.luck.daYun.map((period) => `
              <article class="luck-period">
                <div class="luck-period-head">
                  <small>${period.startYear}-${period.endYear}</small>
                  <strong>${period.ganZhi}</strong>
                  <p class="meta">
                    ${period.startAge}-${period.endAge}岁<br>
                    天干：${period.gan}（${period.ganWuXing}，${period.ganShiShen}）<br>
                    地支：${period.zhi}（${period.zhiWuXing}）<br>
                    藏干：${hiddenSummary(period)}<br>
                    纳音：${period.naYin}<br>
                    旬空：${period.xunKong}
                  </p>
                </div>
                <div class="year-grid">
                  ${period.liuNian.map((year) => `
                    <details class="year-card">
                      <summary>
                        <strong>${year.ganZhi}</strong>
                        <small>${year.year}年 · ${year.age}岁</small>
                      </summary>
                      <p class="meta">
                        ${year.gan}：${year.ganWuXing} · ${year.ganShiShen}<br>
                        ${year.zhi}：${year.zhiWuXing}<br>
                        藏干：${hiddenSummary(year)}<br>
                        纳音：${year.naYin}<br>
                        空亡：${year.xunKong}
                      </p>
                      <div class="month-grid">
                        ${year.liuYue.map((month) => `
                          <details class="month-card" data-flow-year="${year.year}" data-flow-month-index="${month.index}">
                            <summary><b>${month.monthName} ${month.ganZhi}</b></summary>
                            <p class="meta">
                              ${month.gan}：${month.ganShiShen}<br>
                              ${month.zhi}：${month.zhiWuXing}<br>
                              空亡：${month.xunKong}
                            </p>
                            <div class="flow-days"></div>
                          </details>
                        `).join('')}
                      </div>
                    </details>
                  `).join('')}
                </div>
              </article>
            `).join('')}
          </div>
        `;

      };

      const load = async () => {
        const params = new URLSearchParams(new FormData(form));
        currentParams = params;
        statusEl.textContent = '排盘中...';

        try {
          const response = await fetch(`/api/astrolabe?${params.toString()}`);
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || '请求失败');
          }

          render(data);
          document.querySelector('.workspace')?.classList.remove('result-fade');
          requestAnimationFrame(() => document.querySelector('.workspace')?.classList.add('result-fade'));
          const dstText = data.input.daylightSaving
            ? `，${data.input.daylightSavingMode === 'auto' ? '自动识别夏令时' : '手动指定夏令时'}，已折算为标准时间 ${data.input.normalizedBirth.standardTime}`
            : `，${data.input.daylightSavingMode === 'auto' ? '自动判定非夏令时' : '手动指定标准时'}`;
          const estimateText = data.input.normalizedBirth.estimatedFromTimeIndex
            ? '，未填出生时间时按时辰中点估算'
            : '';
          const solarText = data.input.trueSolarTime
            ? `，真太阳时 ${data.input.normalizedBirth.trueSolarClockTime}`
            : '';
          statusEl.textContent = `已生成：${data.summary.time}${dstText}${solarText}${estimateText}，当前定位时点 ${data.input.target}，命宫在${data.summary.soulPalaceBranch}，身宫在${data.summary.bodyPalaceBranch}`;
        } catch (error) {
          statusEl.textContent = error.message;
        }
      };

      const renderFlowDays = (data) => `
        <div class="flow-loading">${data.range.startTerm} ${data.range.startDate} 至 ${data.range.endTerm} ${data.range.endDate}</div>
        <div class="flow-detail">
          <div class="day-grid">
            ${data.days.map((day, index) => `
              <button class="day-card${index === 0 ? ' active' : ''}" type="button" data-day-index="${index}">
                <b>${day.ganZhi}</b>
                <small>${day.date} · 农历${day.lunarDate}</small>
                <span class="meta">${day.ganShiShen || '-'} ｜ ${day.naYin}</span>
              </button>
            `).join('')}
          </div>
          <div class="day-detail">
            ${renderDayDetail(data.days[0])}
          </div>
        </div>
      `;

      const renderDayDetail = (day) => `
        <h3>${day.date} · ${day.ganZhi}</h3>
        <p class="meta">
          农历：${day.lunarDate}<br>
          ${day.gan}：${day.ganWuXing} · ${day.ganShiShen}<br>
          ${day.zhi}：${day.zhiWuXing}<br>
          藏干：${hiddenSummary(day)}<br>
          纳音：${day.naYin} ｜ 空亡：${day.xunKong}<br>
          宜：${day.yi.slice(0, 6).join('、') || '-'}<br>
          忌：${day.ji.slice(0, 6).join('、') || '-'}
        </p>
        <div class="hour-grid">
          ${day.hours.map((hour) => `
            <div class="hour-card">
              <b>${hour.label} ${hour.ganZhi}</b>
              <p class="meta">
                ${hour.range}<br>
                ${hour.gan}：${hour.ganShiShen}<br>
                ${hour.zhi}：${hour.zhiWuXing}<br>
                空亡：${hour.xunKong}<br>
                ${hour.tianShen} · ${hour.tianShenType}
              </p>
            </div>
          `).join('')}
        </div>
      `;

      const loadCities = async () => {
        try {
          const response = await fetch('/api/cities');
          const data = await response.json();
          cityListEl.innerHTML = data.cities.map((city) => `<option value="${city.name}"></option>`).join('');
        } catch (error) {
          cityListEl.innerHTML = '';
        }
      };

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        load();
      });

      workspaceButtons.forEach((button) => {
        button.addEventListener('click', () => {
          activateView(button.dataset.view);
        });
      });

      baziEl.addEventListener('toggle', async (event) => {
        const target = event.target;

        if (!target.matches('.month-card') || !target.open || target.dataset.loaded) {
          return;
        }

        const container = target.querySelector('.flow-days');
        const params = new URLSearchParams(currentParams);
        params.set('flowYear', target.dataset.flowYear);
        params.set('flowMonthIndex', target.dataset.flowMonthIndex);
        container.innerHTML = '<div class="flow-loading">加载流日流时...</div>';

        try {
          const response = await fetch(`/api/flow-days?${params.toString()}`);
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || '请求失败');
          }

          target.dataset.loaded = 'true';
          container.innerHTML = renderFlowDays(data);
          container.flowDays = data.days;
        } catch (error) {
          container.innerHTML = `<div class="flow-loading">${error.message}</div>`;
        }
      }, true);

      baziEl.addEventListener('click', (event) => {
        const button = event.target.closest('.day-card');

        if (!button) {
          return;
        }

        const container = button.closest('.flow-days');
        const detail = container.querySelector('.day-detail');
        const day = container.flowDays?.[Number(button.dataset.dayIndex)];

        if (!day) {
          return;
        }

        container.querySelectorAll('.day-card').forEach((item) => item.classList.remove('active'));
        button.classList.add('active');
        detail.innerHTML = renderDayDetail(day);
      });

      loadCities();
      load();
    </script>
  </body>
</html>
